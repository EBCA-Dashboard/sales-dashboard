<script>

/* =========================================================
   COMPLETE KPI + AGGREGATION + CHART FIX REBUILD
   ========================================================= */

/* =========================================================
   STEP 1 — HELPERS
   ========================================================= */

function cleanText(v){
  return String(v || "")
    .trim()
    .replace(/\s+/g, " ");
}

function normalizeKey(v){
  return cleanText(v).toLowerCase();
}

function parseNum(v){
  if(v == null || v === "") return 0;

  const cleaned = String(v)
    .replace(/,/g, "")
    .trim();

  const n = parseFloat(cleaned);

  return isNaN(n) ? 0 : n;
}

function normalizeDate(dateStr){

  if(!dateStr) return "";

  const d = new Date(dateStr);

  if(isNaN(d)) return "";

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");

  return `${y}-${m}-${day}`;
}

function monthKey(dateStr){

  const d = new Date(dateStr);

  if(isNaN(d)) return "";

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

function getFilteredOptions(rows, field){

  return Array.from(
    new Set(
      rows
        .map(r => r[field])
        .filter(Boolean)
    )
  ).sort();
}

/* =========================================================
   STEP 2 — NORMALIZATION
   ========================================================= */

function normS(r){

  return {

    orderNo: cleanText(r["Order - No"]),
    orderDate: normalizeDate(r["Order date"]),
    deliveryDate: normalizeDate(r["Delivery Date"]),

    year: cleanText(r["Year"]),
    erpNum: cleanText(r["ERP Num."]),
    invNo: cleanText(r["Inv. No."]),

    customer: cleanText(r["Customer Name"]),
    customerKey: normalizeKey(r["Customer Name"]),

    country: cleanText(r["Country"]),

    custCode: cleanText(r["Customer Code"]),
    custType: cleanText(r["Customer Type"]),

    market: cleanText(r["Market"]),
    tawjeh: cleanText(r["التوجيه"]),

    product: cleanText(r["Product Name"]),
    productKey: normalizeKey(r["Product Name"]),

    family: cleanText(r["Family"]),
    familyKey: normalizeKey(r["Family"]),

    base: cleanText(r["Base"]),

    salesPrice: parseNum(r["Sales Price"]),
    qty: parseNum(r["Qty. (kg.)"]),

    totalInv: parseNum(r["Total Sales Inv"]),

    currency: cleanText(r["Currency"]),
    rate: parseNum(r["Rate"]) || 1,

    priceMod: parseNum(r["Price Modification EGP"]),

    /* OFFICIAL SALES KPI */
    totalValVAT: parseNum(r["Total Val. EGP + VAT"]),

    paymentTerms: cleanText(r["Payment Terms"]),

    salesManager: cleanText(r["Sales Manager"]),
    salesperson: cleanText(r["Salesperson"]),

    remarks: cleanText(r["Remarks"])
  };
}

/* =========================================================
   STEP 3 — CENTRAL AGGREGATION ENGINE
   ========================================================= */

function buildAggregatedSales(rows){

  const map = {};

  rows.forEach(r => {

    const key = [
      r.customerKey,
      r.productKey,
      r.orderDate
    ].join("||");

    if(!map[key]){

      map[key] = {

        ...r,

        qty: 0,
        totalValVAT: 0,
        totalInv: 0
      };
    }

    map[key].qty += r.qty;
    map[key].totalValVAT += r.totalValVAT;
    map[key].totalInv += r.totalInv;
  });

  return Object.values(map);
}

/* =========================================================
   STEP 4 — KPI ENGINE
   ========================================================= */

function calcSKPI(rows){

  const aggregated = buildAggregatedSales(rows);

  let totalQty = 0;
  let totalVal = 0;

  const uniqueOrders = new Set();

  const productTotals = {};

  aggregated.forEach(r => {

    totalQty += r.qty;
    totalVal += r.totalValVAT;

    /* UNIQUE ORDER */
    const orderKey = [
      r.customerKey,
      r.orderDate
    ].join("||");

    uniqueOrders.add(orderKey);

    /* BEST PRODUCT */
    if(!productTotals[r.product]){
      productTotals[r.product] = 0;
    }

    productTotals[r.product] += r.qty;
  });

  let bestProduct = "--";
  let bestQty = 0;

  Object.entries(productTotals).forEach(([product, qty]) => {

    if(qty > bestQty){

      bestQty = qty;
      bestProduct = product;
    }
  });

  return {

    totalQty,

    totalVal,

    /* CORRECT FINANCIAL AVG */
    avgPrice: totalQty > 0
      ? totalVal / totalQty
      : 0,

    totalOrders: uniqueOrders.size,

    bestProd: bestProduct,

    bestQty
  };
}

/* =========================================================
   STEP 5 — DIMENSION CHARTS
   ========================================================= */

function getDimData(rows, dim){

  const aggregated = buildAggregatedSales(rows);

  const map = {};

  aggregated.forEach(r => {

    const key = r[dim] || "N/A";

    if(!map[key]){

      map[key] = {

        name: key,
        sales: 0,
        qty: 0
      };
    }

    map[key].sales += r.totalValVAT;
    map[key].qty += r.qty;
  });

  return Object.values(map)
    .sort((a,b) => b.sales - a.sales)
    .slice(0,10);
}

/* =========================================================
   STEP 6 — COUNTRY CHART
   ========================================================= */

function getCountryData(rows){

  const aggregated = buildAggregatedSales(rows);

  const map = {};

  aggregated.forEach(r => {

    if(!map[r.country]){

      map[r.country] = {

        country: r.country,
        sales: 0
      };
    }

    map[r.country].sales += r.totalValVAT;
  });

  return Object.values(map)
    .sort((a,b) => b.sales - a.sales)
    .slice(0,10);
}

/* =========================================================
   STEP 7 — TREND CHART
   ========================================================= */

function getTrendData(rows){

  const aggregated = buildAggregatedSales(rows);

  const familyTotals = {};

  aggregated.forEach(r => {

    if(!familyTotals[r.family]){
      familyTotals[r.family] = 0;
    }

    familyTotals[r.family] += r.qty;
  });

  /* TOP 5 FAMILIES BY QTY */

  const topFamilies = Object.entries(familyTotals)
    .sort((a,b) => b[1] - a[1])
    .slice(0,5)
    .map(x => x[0]);

  const monthly = {};

  aggregated.forEach(r => {

    if(!topFamilies.includes(r.family)) return;

    const mk = monthKey(r.deliveryDate);

    if(!mk) return;

    if(!monthly[mk]){

      monthly[mk] = {

        raw: mk,

        mo: new Date(mk + "-01")
          .toLocaleDateString("en-US", {
            month: "short",
            year: "2-digit"
          })
      };
    }

    if(!monthly[mk][r.family]){

      monthly[mk][r.family] = {

        qty: 0,
        val: 0
      };
    }

    monthly[mk][r.family].qty += r.qty;
    monthly[mk][r.family].val += r.totalValVAT;
  });

  const data = Object.values(monthly)
    .sort((a,b) => a.raw.localeCompare(b.raw))
    .map(row => {

      const out = {
        mo: row.mo
      };

      topFamilies.forEach(f => {

        const d = row[f];

        out[f] = d && d.qty > 0
          ? +(d.val / d.qty).toFixed(2)
          : null;
      });

      return out;
    });

  return {

    data,
    fams: topFamilies
  };
}
