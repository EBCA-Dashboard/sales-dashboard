/* ═══════════════════════════════════════════════
   GOOGLE SHEETS FETCH
═══════════════════════════════════════════════ */
async function fetchSheet(sheetId, sheetName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(sheetName)}?key=${CONFIG.GOOGLE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet "${sheetName}" fetch failed: ${res.status}`);
  const data = await res.json();
  const rows = data.values || [];
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] !== undefined ? row[i] : ""; });
    return obj;
  });
}

/* ═══════════════════════════════════════════════

const num=(n,d=0)=>n==null?"—":new Intl.NumberFormat("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}).format(Math.round(n*(10**d))/(10**d));
const fmtK=(n)=>n==null?"—":n>=1e6?num(n/1e6,1)+"M":n>=1e3?num(n/1e3,1)+"K":num(n);
const fmtDate=(s)=>{if(!s)return"—";const d=new Date(s);return isNaN(d)?"—":d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"})};
const MON_NAMES=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* ═══════════════════════════════════════════════
   KPI CALCULATIONS
═══════════════════════════════════════════════ */
function calcSalesKPIs(rows) {
  const totalQty = rows.reduce((s,r)=>s+r.qty, 0);
  const totalValExVAT = rows.reduce((s,r)=>s+(r.totalValVAT/1.14), 0);
  // Average of per-order averages (your preferred method)
  const orderAvgs = rows.map(r=>r.qty>0?(r.totalInv*r.rate)/r.qty:0).filter(v=>v>0);
  const avgPricePerOrder = orderAvgs.length ? orderAvgs.reduce((a,b)=>a+b,0)/orderAvgs.length : 0;
  // Weighted average for reference
  const avgPriceWeighted = totalQty > 0 ? totalValExVAT/totalQty : 0;
  // Total orders = unique (Customer Name + Order date)
  const orderKeys = new Set(rows.map(r=>`${r.customer}||${r.orderDate}`));
  const totalOrders = orderKeys.size;
  // Best selling product by qty
  const prodQty = {};
  rows.forEach(r=>{ prodQty[r.product] = (prodQty[r.product]||0) + r.qty; });
  const best = Object.entries(prodQty).sort((a,b)=>b[1]-a[1])[0];
  return { totalQty, totalValExVAT, avgPricePerOrder, avgPriceWeighted, totalOrders,
    bestProduct: best?best[0]:"—", bestProductQty: best?best[1]:0 };
}

function calcPendingKPIs(rows) {
  const totalRemQty = rows.reduce((s,r)=>s+r.remQty, 0);
  const totalRemAmt = rows.reduce((s,r)=>s+r.remAmt, 0);
  const orderAvgs = rows.map(r=>r.reqQty>0?r.totNoVAT/r.reqQty:0).filter(v=>v>0);
  const avgPrice = orderAvgs.length ? orderAvgs.reduce((a,b)=>a+b,0)/orderAvgs.length : 0;
  return { totalRemQty, totalRemAmt, avgPrice, totalOrders: rows.length };
}

/* ═══════════════════════════════════════════════
   CHART HELPERS
═══════════════════════════════════════════════ */
function getDimData(rows, dim) {
  const KEY={salesManager:"salesManager",salesperson:"salesperson",base:"base",market:"market",family:"family",tawjeh:"tawjeh"};
  const k=KEY[dim]||"salesManager";
  const m={};
  rows.forEach(r=>{
    const key=r[k]||"N/A";
    if(!m[key])m[key]={name:key,sales:0,qty:0};
    m[key].sales+=r.totalValVAT/1.14;
    m[key].qty+=r.qty;
  });
  return Object.values(m).sort((a,b)=>b.sales-a.sales).slice(0,10)
    .map(d=>({...d,sales:Math.round(d.sales),qty:Math.round(d.qty),shortName:d.name.length>13?d.name.slice(0,13)+"…":d.name}));
}
function getCountryData(rows) {
  const m={};
  rows.forEach(r=>{if(!m[r.country])m[r.country]={country:r.country,sales:0};m[r.country].sales+=r.totalValVAT/1.14;});
  return Object.values(m).sort((a,b)=>b.sales-a.sales).slice(0,10).map(d=>({...d,sales:Math.round(d.sales)}));
}
function getPriceTrendData(rows) {
  const fams=[...new Set(rows.map(r=>r.family))].slice(0,5);
  const mo={};
  rows.forEach(r=>{
    if(!r.deliveryDate)return;
    const k=r.deliveryDate.slice(0,7);
    if(!mo[k])mo[k]={mo:new Date(k+"-01").toLocaleDateString("en-US",{month:"short",year:"2-digit"}),raw:k};
    fams.forEach(f=>{if(r.family===f){mo[k][f+"_s"]=(mo[k][f+"_s"]||0)+r.totalInv*r.rate;mo[k][f+"_q"]=(mo[k][f+"_q"]||0)+r.qty;}});
  });
  const data=Object.values(mo).sort((a,b)=>a.raw.localeCompare(b.raw))
    .map(row=>{const out={mo:row.mo};fams.forEach(f=>{out[f]=row[f+"_q"]>0?+(row[f+"_s"]/row[f+"_q"]).toFixed(2):null});return out;});
  return{data,fams};
}
function getPendCustData(rows) {
  const m={};
  rows.forEach(r=>{const k=r.customer;if(!m[k])m[k]={name:k.split(" ").slice(0,2).join(" "),remQty:0,remAmt:0};m[k].remQty+=r.remQty;m[k].remAmt+=r.remAmt;});
  return Object.values(m).sort((a,b)=>b.remAmt-a.remAmt).slice(0,9).map(d=>({...d,remQty:Math.round(d.remQty),remAmt:Math.round(d.remAmt)}));
}
function getPendFamData(rows) {
  const m={};
  rows.forEach(r=>{if(!m[r.family])m[r.family]={family:r.family,remQty:0,remAmt:0};m[r.family].remQty+=r.remQty;m[r.family].remAmt+=r.remAmt;});
  return Object.values(m).sort((a,b)=>b.remAmt-a.remAmt).map(d=>({...d,remQty:Math.round(d.remQty),remAmt:Math.round(d.remAmt)}));
}

/* ═══════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════ */
function Login({onLogin, rlsUsers}){
  const [email,setEmail]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const attempt=()=>{
    setLoading(true);setErr("");
    const e=email.trim().toLowerCase();
    const u=rlsUsers.find(u=>u.email===e);
    if(u){onLogin({...u,email:e});}
    else{setErr("No account found. Check your email or contact your admin.");}
    setLoading(false);
  };

  return h("div",{style:{minHeight:"100vh",background:`linear-gradient(135deg,${B.blueLL} 0%,#FFF8F8 60%,${B.bg} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h("div",{style:{position:"fixed",top:-150,right:-100,width:500,height:500,borderRadius:"50%",background:`radial-gradient(${B.blue}12,transparent 70%)`,pointerEvents:"none"}}),
    h("div",{style:{position:"fixed",bottom:-80,left:-60,width:380,height:380,borderRadius:"50%",background:`radial-gradient(${B.red}08,transparent 70%)`,pointerEvents:"none"}}),
    h("div",{style:{width:"100%",maxWidth:420,position:"relative",zIndex:1}},
      h("div",{style:{textAlign:"center",marginBottom:22}},
        h("div",{style:{display:"inline-flex",alignItems:"center",gap:12,background:"#fff",padding:"12px 24px",borderRadius:14,border:`1px solid ${B.border}`,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}},
          h(EBCLogo,{size:"md"}))),
      h("div",{style:{background:"#fff",border:`1px solid ${B.border}`,borderRadius:18,padding:"36px 32px",boxShadow:"0 12px 48px rgba(21,101,192,.1)"}},
        h("div",{style:{textAlign:"center",marginBottom:28}},
          h("h1",{style:{fontFamily:"'DM Serif Display',serif",fontSize:24,color:B.text,marginBottom:6}},"Sales Intelligence Portal"),

  const sKPI=useMemo(()=>calcSalesKPIs(sRows),[sRows]);

  const [summary,setSummary]=useState("");const [sumL,setSumL]=useState(false);

  const [risks,setRisks]=useState([]);const [rskL,setRskL]=useState(false);

  const [digest,setDigest]=useState("");const [digL,setDigL]=useState(false);
  const [copied,setCopied]=useState(false);
  const [msgs,setMsgs]=useState([]);const [chatL,setChatL]=useState(false);
  const [chatIn,setChatIn]=useState("");

  const hasKey=CONFIG.ANTHROPIC_KEY&&CONFIG.ANTHROPIC_KEY!=="YOUR_ANTHROPIC_KEY";

Pending: ${pRows.length} orders. Rem Qty: ${fmtK(pKPI.totalRemQty)} KG. Rem Amt: ${fmtK(pKPI.totalRemAmt)} EGP.

  const claude=async(prompt,sys)=>{
    if(!hasKey)return"⚠️ Anthropic API key not configured yet. Add your key to the CONFIG section at the top of index.html.";
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":CONFIG.ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:sys||"You are a senior sales analytics advisor for Egyptian British Co., a specialty chemicals company. Be precise, professional, and data-driven. Use EGP for currency.",
          messages:[{role:"user",content:prompt}]})});
      const d=await r.json();

  const genSummary=async()=>{setSumL(true);const r=await claude(`Write a 4-sentence professional performance summary. Use specific numbers. Data:\n${ctx}`);setSummary(r);setSumL(false);};
  const genAlerts=async()=>{setAltL(true);const r=await claude(`Identify 4 anomalies or insights. Format EXACTLY:\nTYPE|MESSAGE (TYPE: warn/danger/info/good)\nData:\n${ctx}`,"Return only formatted lines, nothing else.");const p=r.split("\n").filter(l=>l.includes("|")).map(l=>{const[t,...m]=l.split("|");return{type:t.trim().toLowerCase(),msg:m.join("|").trim()};});setAlerts(p.length?p:[{type:"info",msg:r}]);setAltL(false);};
  const genRisks=async()=>{setRskL(true);const r=await claude(`Identify 4 risks in pending orders. Format EXACTLY:\nTYPE|MESSAGE (TYPE: warn/danger/info/good)\nData: ${pRows.length} orders, ${fmtK(pKPI.totalRemAmt)} EGP remaining, ${fmtK(pKPI.totalRemQty)} KG.`,"Return only formatted lines, nothing else.");const p=r.split("\n").filter(l=>l.includes("|")).map(l=>{const[t,...m]=l.split("|");return{type:t.trim().toLowerCase(),msg:m.join("|").trim()};});setRisks(p.length?p:[{type:"warn",msg:r}]);setRskL(false);};
  const genForecast=async()=>{setForL(true);const r=await claude(`Forecast next month revenue. Return ONLY JSON: {"value":"XXM","confidence":"XX%","trend":"up/flat/down","notes":"2 sentences"}\nData:\n${ctx}`,"Return only valid JSON, no markdown.");try{const j=JSON.parse(r.replace(/```json|```/g,"").trim());setForecast(j);}catch{setForecast({value:"N/A",confidence:"—",trend:"flat",notes:r.slice(0,150)});}setForL(false);};
  const genDigest=async()=>{setDigL(true);const r=await claude(`Write a weekly digest for EBC team. Under 180 words. Plain text for email/WhatsApp. Include key metrics, highlights, 2 action points.\nData:\n${ctx}`,"Plain text only. No markdown headers.");setDigest(r);setDigL(false);};
  const sendChat=async()=>{const msg=chatIn.trim();if(!msg||chatL)return;setChatIn("");setMsgs(p=>[...p,{role:"user",content:msg}]);setChatL(true);const r=await claude(`Answer concisely (max 3 sentences) with specific numbers.\nQuestion: ${msg}\nData:\n${ctx}`,"Sales data analyst for EBC. Max 3 sentences with numbers.");setMsgs(p=>[...p,{role:"ai",content:r}]);setChatL(false);};

      h("p",{style:{fontSize:13.5,color:B.muted,lineHeight:1.8,marginBottom:16}},error),
      h("div",{style:{background:B.blueLL,borderRadius:10,padding:"14px 16px",fontSize:12.5,color:B.muted,textAlign:"left",lineHeight:1.8}},
        "Common fixes:",h("br"),
        "• Check your Sheet IDs are correct",h("br"),
        "• Make sure all 3 sheets are shared as 'Anyone with link can view'",h("br"),
        "• Verify your Google API key is valid",h("br"),
        "• Check the sheet name matches exactly: 'Sales View', 'Pending Sales', 'RLS Config'"
      )
    )
  );

  const TABS=[["sales","📊 Sales Dashboard"],["pending","🔄 Pending Orders"],["ai","🤖 AI Insights"]];

  if(!user)return h("div",null,h(Login,{onLogin:u=>{setUser(u);setTab("sales");},rlsUsers}),h(PrintArea));

  return h("div",{id:"main-app"},
    h(Header,{user,onLogout:()=>setUser(null),lastSync}),
    h("div",{style:{background:"#fff",borderBottom:`1px solid ${B.border}`}},
      h("div",{style:{maxWidth:1480,margin:"0 auto",padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}},
        TABS.map(([k,l])=>h("button",{key:k,className:`tab-btn${tab===k?" active":""}`,onClick:()=>setTab(k)},l))
      )
    ),
    h("div",{className:"page"},
      tab==="sales"&&h(SalesTab,{user,salesData}),
      tab==="pending"&&h(PendingTab,{user,pendingData}),
      tab==="ai"&&h(AITab,{user,salesData,pendingData})
    ),
    h("div",{style:{textAlign:"center",padding:"12px 0 20px",color:B.subtle,fontSize:11,borderTop:`1px solid ${B.border}`,marginTop:8}},
      h("span",{style:{fontWeight:700}},h("span",{style:{color:B.blue}},"Egyptian "),h("span",{style:{color:B.red}},"British Co.")),
      " · Sales Intelligence Portal · ",user.role==="rep"?`RLS Active — ${user.rep_name} view only`:"Full manager access — all data visible"
    ),
    h(PrintArea)
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
} // end bootDashboard
window.addEventListener("load", bootDashboard);
</script>
</body>
</html>
