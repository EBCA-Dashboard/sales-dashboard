<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EBC Sales Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1565C0;--blue2:#1976D2;--blue3:#42A5F5;--blue-l:#E3F2FD;--blue-ll:#F0F7FF;
  --red:#C62828;--red2:#D32F2F;--red-l:#FFEBEE;
  --bg:#F4F6FA;--card:#FFFFFF;--border:#E0E7EF;
  --text:#0F1C2E;--muted:#4A5568;--subtle:#8898AA;
  --green:#1B7E4C;--green-l:#E6F5EC;
  --amber:#B45309;--amber-l:#FEF3C7;
  --shadow:0 1px 4px rgba(15,28,46,.07),0 4px 16px rgba(15,28,46,.06);
  --shadow-lg:0 8px 32px rgba(21,101,192,.12);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
input,select,button,textarea{font-family:'Plus Jakarta Sans',sans-serif}

/* ── Layout ── */
.page{max-width:1480px;margin:0 auto;padding:20px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:1100px){.grid6{grid-template-columns:repeat(3,1fr)}.grid5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}.grid5{grid-template-columns:1fr 1fr}.grid6{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.grid3{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}.hide-xs{display:none!important}}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.card-flush{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}

/* ── KPI Cards ── */
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--blue2))}
.kpi-label{font-size:10px;font-weight:700;color:var(--subtle);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.kpi-val{font-family:'DM Serif Display',serif;font-size:26px;color:var(--kpi-color,var(--text));line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500}
.kpi-icon{position:absolute;top:14px;right:16px;font-size:20px;opacity:.15}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:var(--blue2);color:#fff}.btn-blue:hover{background:var(--blue)}
.btn-outline{background:transparent;color:var(--blue2);border:1.5px solid var(--blue2)}.btn-outline:hover{background:var(--blue-l)}
.btn-red{background:var(--red2);color:#fff}.btn-red:hover{background:var(--red)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.03em}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-red{background:var(--red-l);color:var(--red2)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-gray{background:#F1F5F9;color:var(--muted)}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 11px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--subtle);border-bottom:2px solid var(--border);background:#FAFBFD;white-space:nowrap;text-transform:uppercase}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#F7FAFF}

/* ── Filters ── */
.slicer{padding:7px 11px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;transition:border-color .15s}
.slicer:focus,.slicer:hover{border-color:var(--blue2)}

/* ── Tabs ── */
.tab-btn{padding:10px 18px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:var(--blue2);border-bottom-color:var(--blue2)}
.tab-btn:hover:not(.active){color:var(--text)}

/* ── Dim buttons ── */
.dim-btn{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.dim-btn.active{background:var(--blue-l);color:var(--blue);border-color:var(--blue2)}

/* ── AI alerts ── */
.ai-alert{border-radius:10px;padding:11px 14px;margin-bottom:9px;font-size:12.5px;line-height:1.6;border-left:3px solid}
.ai-warn{background:var(--amber-l);border-color:#D97706;color:#78350F}
.ai-danger{background:var(--red-l);border-color:var(--red2);color:#7F1D1D}
.ai-info{background:var(--blue-l);border-color:var(--blue2);color:#1E40AF}
.ai-good{background:var(--green-l);border-color:var(--green);color:#14532D}

/* ── Chat ── */
.chat-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;max-width:85%;margin-bottom:8px;animation:fadeUp .25s ease}
.chat-user{background:var(--blue2);color:#fff;margin-left:auto;border-bottom-right-radius:3px}
.chat-ai{background:#F1F5F9;color:var(--text);border-bottom-left-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Spinner ── */
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:rot .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── Section titles ── */
.st{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.st-sub{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px}

/* ── Print ── */
@media print{
  #main-app{display:none!important}
  #print-area{display:block!important}
  body{background:#fff}
}
#print-area{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useMemo,useRef,useEffect,useCallback}=React;
const {ResponsiveContainer,ComposedChart,BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,Legend,Cell,PieChart,Pie}=Recharts;

/* ═══════════════════════════════════════════════
   BRAND
═══════════════════════════════════════════════ */
const B={
  blue:"#1976D2",blueD:"#1565C0",blueL:"#E3F2FD",blueLL:"#F0F7FF",
  red:"#D32F2F",redD:"#C62828",redL:"#FFEBEE",
  text:"#0F1C2E",muted:"#4A5568",subtle:"#8898AA",
  border:"#E0E7EF",bg:"#F4F6FA",card:"#FFFFFF",
  green:"#1B7E4C",greenL:"#E6F5EC",
  amber:"#B45309",amberL:"#FEF3C7",
  orange:"#C2410C",
  pal:["#1976D2","#C62828","#0288D1","#2E7D32","#6A1B9A","#E65100","#00695C","#AD1457","#1565C0","#558B2F"],
};

/* ═══════════════════════════════════════════════
   SEED RANDOM
═══════════════════════════════════════════════ */
let _s=0xF3A7;
const rng=()=>{_s=Math.imul(_s^(_s>>>15),_s|1);_s^=_s+Math.imul(_s^(_s>>>7),_s|61);return((_s^(_s>>>14))>>>0)/4294967296};
const pick=a=>a[Math.floor(rng()*a.length)];

/* ═══════════════════════════════════════════════
   MOCK DATA — SALES VIEW
═══════════════════════════════════════════════ */
const PRODUCTS=[
  {name:"Sol-30",family:"Solvents",base:"Mineral"},
  {name:"Sol-40",family:"Solvents",base:"Mineral"},
  {name:"Sol-50",family:"Solvents",base:"Bio-based"},
  {name:"Penetrol-55",family:"Auxiliaries",base:"Synthetic"},
  {name:"Auxilane-200",family:"Auxiliaries",base:"Aqueous"},
  {name:"Auxilane-300",family:"Auxiliaries",base:"Aqueous"},
  {name:"Softener-NE",family:"Softeners",base:"Bio-based"},
  {name:"Softener-GX",family:"Softeners",base:"Synthetic"},
  {name:"Defoamer-AX",family:"Binders",base:"Aqueous"},
  {name:"TexBind-400",family:"Binders",base:"Synthetic"},
  {name:"ChromoFix-R",family:"Fixatives",base:"Synthetic"},
  {name:"LeathoBase-K",family:"Leather Chem.",base:"Mineral"},
  {name:"PaperCoat-X",family:"Coating",base:"Aqueous"},
  {name:"PaperCoat-Z",family:"Coating",base:"Synthetic"},
];
const CUSTOMERS=["ESCO Textiles","Al-Nile Leather","CairoCoat Ltd","DeltaPaper Co.","SinaiChem","MedCoat Egypt","AlexTex Group","SuezIndustries","GizaLeather","KuwaitChem Imp.","TunisTextile","MarocChim","NileDelta Corp","SuezPaper","RedSeaChem"];
const COUNTRIES=["Egypt","Saudi Arabia","UAE","Nigeria","Tunisia","Morocco","Turkey","Sudan","Kuwait","Jordan","Libya","Algeria"];
const MARKETS=["Textile","Leather","Paper","Coating","Industrial"];
const TAWJEH=["محلي","تصدير - خليج","تصدير - أفريقيا","تصدير - أوروبا"];
const CUST_TYPES=["Industrial","Commercial","Government","Distributor"];
const MANAGERS=["Ahmed Hassan","Sara Mohamed","Khaled Ibrahim"];
const SALESPERSONS=["Omar Mahmoud","Nour Ali","Rania Samir","Youssef Kamel","Dina Fouad"];
const CURRENCIES=["EGP","USD","USD","EGP","EUR"];
const PAYMENT=["30 Days Net","60 Days Net","Cash on Delivery","45 Days Net","LC 90 Days"];

function makeDate(maxDaysAgo,base){
  const d=new Date(base||new Date(2026,4,4));
  d.setDate(d.getDate()-Math.floor(rng()*maxDaysAgo));
  return d.toISOString().slice(0,10);
}

// Build sales: group orders (some customers buy multiple products per order)
const SALES_DATA=[];
let orderCounter=1000;
CUSTOMERS.forEach(cust=>{
  const numOrders=Math.floor(rng()*6)+2;
  for(let o=0;o<numOrders;o++){
    const oDate=makeDate(400);
    const dDate=new Date(oDate);dDate.setDate(dDate.getDate()+Math.floor(rng()*25)+5);
    const numProds=Math.floor(rng()*3)+1;
    const mgr=pick(MANAGERS);const sp=pick(SALESPERSONS);
    const curr=pick(CURRENCIES);const country=pick(COUNTRIES);
    const market=pick(MARKETS);const tawjeh=pick(TAWJEH);
    const custType=pick(CUST_TYPES);
    const erpNum=`ERP-${10000+orderCounter}`;
    orderCounter++;
    const usedProds=new Set();
    for(let p=0;p<numProds;p++){
      let prod;do{prod=pick(PRODUCTS);}while(usedProds.has(prod.name)&&usedProds.size<PRODUCTS.length);
      usedProds.add(prod.name);
      const qty=Math.round((rng()*15000+1000)/100)*100;
      const salesPrice=+(rng()*28+7).toFixed(2);
      const totInv=+(qty*salesPrice).toFixed(2);
      const rate=curr==="EGP"?1:+(rng()*1.5+49).toFixed(2);
      const priceMod=+(rng()*600-200).toFixed(2);
      const totVAT=+(totInv*rate*1.14+priceMod).toFixed(2);
      const invNo=`INV-${20000+SALES_DATA.length}`;
      SALES_DATA.push({
        orderNo:`ORD-${erpNum}`,orderDate:oDate,deliveryDate:dDate.toISOString().slice(0,10),
        year:new Date(oDate).getFullYear(),erpNum,invNo,
        customer:cust,country,custCode:`C${300+CUSTOMERS.indexOf(cust)}`,
        custType,market,tawjeh,
        product:prod.name,family:prod.family,base:prod.base,
        salesPrice,qty,totalInv:totInv,currency:curr,rate,
        priceMod,totalValVAT:totVAT,
        paymentTerms:pick(PAYMENT),salesManager:mgr,salesperson:sp,remarks:"",
      });
    }
  }
});

/* ═══════════════════════════════════════════════
   MOCK DATA — PENDING SALES
═══════════════════════════════════════════════ */
const STATUSES=["Pending Approval","In Production","Ready to Ship","Partial Delivery","On Hold","Awaiting Payment"];
const PENDING_DATA=[];
for(let i=0;i<52;i++){
  const prod=pick(PRODUCTS);const curr=pick(CURRENCIES);
  const reqQty=Math.round((rng()*22000+3000)/500)*500;
  const delQty=Math.floor(rng()*0.65*reqQty/500)*500;
  const remQty=reqQty-delQty;
  const priceExVAT=+(rng()*32+8).toFixed(2);
  const priceInVAT=+(priceExVAT*1.14).toFixed(2);
  const rate=curr==="EGP"?1:+(rng()*1.5+49).toFixed(2);
  const totNoVAT=+(reqQty*priceExVAT*rate).toFixed(2);
  const remAmt=+(remQty*priceExVAT*rate).toFixed(2);
  const totWithVAT=+(reqQty*priceInVAT).toFixed(2);
  const mgr=pick(MANAGERS);const sp=pick(SALESPERSONS);
  const cust=pick(CUSTOMERS);
  PENDING_DATA.push({
    id:i+1,base:prod.base,region:pick(["Cairo","Alexandria","Delta","Upper Egypt","Gulf","Export"]),
    custType:pick(CUST_TYPES),family:prod.family,salesManager:mgr,salesMan:sp,
    serNo:`SER-${5000+i}`,custCode:`C${310+i}`,oracleCode:`ORC-${7000+i}`,
    orderDate:makeDate(180),customer:cust,country:pick(COUNTRIES),
    incoterm:pick(["FOB","CIF","EXW","DDP","CPT"]),
    product:prod.name,reqQty,delQty,remQty,
    priceExVAT,priceInVAT,currency:curr,rate,
    totNoVAT,remAmt,totWithVAT,
    status:pick(STATUSES),paymentTerms:pick(PAYMENT),remarks:"",
  });
}

/* ═══════════════════════════════════════════════
   USERS / RLS
═══════════════════════════════════════════════ */
const USERS={
  "manager@ebc.com":{name:"Ahmed Hassan",role:"manager",rep:null,title:"Sales Director"},
  "sara@ebc.com":{name:"Sara Mohamed",role:"rep",rep:"Sara Mohamed",title:"Sales Manager"},
  "khaled@ebc.com":{name:"Khaled Ibrahim",role:"rep",rep:"Khaled Ibrahim",title:"Sales Manager"},
  "omar@ebc.com":{name:"Omar Mahmoud",role:"rep",rep:"Omar Mahmoud",title:"Salesperson"},
};

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
const num=(n,d=0)=>n==null?"—":new Intl.NumberFormat("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fmtK=(n)=>n==null?"—":n>=1e6?num(n/1e6,1)+"M":n>=1e3?num(n/1e3,1)+"K":num(n);
const fmtDate=(s)=>s?new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}):"—";
const MON_NAMES=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* ═══════════════════════════════════════════════
   CALC KPIs
═══════════════════════════════════════════════ */
function calcSalesKPIs(rows){
  const totalQty=rows.reduce((s,r)=>s+r.qty,0);
  // Total Val EGP EXCLUDING VAT = totalValVAT / 1.14
  const totalValExVAT=rows.reduce((s,r)=>s+(r.totalValVAT/1.14),0);
  // Avg Price/KG — METHOD: avg of per-order (totalInv*rate / qty), then average those
  const orderAvgs=rows.map(r=>r.qty>0?(r.totalInv*r.rate)/r.qty:0).filter(v=>v>0);
  const avgPricePerOrder=orderAvgs.length?orderAvgs.reduce((a,b)=>a+b,0)/orderAvgs.length:0;
  // Also weighted for reference
  const avgPriceWeighted=totalQty>0?totalValExVAT/totalQty:0;
  // Total ORDERS: unique (customer + orderDate)
  const orderKeys=new Set(rows.map(r=>`${r.customer}||${r.orderDate}`));
  const totalOrders=orderKeys.size;
  // Best selling product by qty
  const prodQty={};rows.forEach(r=>{prodQty[r.product]=(prodQty[r.product]||0)+r.qty});
  const best=Object.entries(prodQty).sort((a,b)=>b[1]-a[1])[0];
  return{totalQty,totalValExVAT,avgPricePerOrder,avgPriceWeighted,totalOrders,
    bestProduct:best?best[0]:"—",bestProductQty:best?best[1]:0};
}
function calcPendingKPIs(rows){
  const totalRemQty=rows.reduce((s,r)=>s+r.remQty,0);
  const totalRemAmt=rows.reduce((s,r)=>s+r.remAmt,0);
  const totalReqAmt=rows.reduce((s,r)=>s+r.totNoVAT,0);
  // Avg price per order method
  const orderAvgs=rows.map(r=>r.reqQty>0?r.totNoVAT/r.reqQty:0).filter(v=>v>0);
  const avgPrice=orderAvgs.length?orderAvgs.reduce((a,b)=>a+b,0)/orderAvgs.length:0;
  return{totalRemQty,totalRemAmt,totalReqAmt,avgPrice,totalOrders:rows.length};
}

/* ═══════════════════════════════════════════════
   CHART DATA HELPERS
═══════════════════════════════════════════════ */
function getDimData(rows,dim){
  const KEY={salesManager:"salesManager",salesperson:"salesperson",base:"base",market:"market",family:"family",tawjeh:"tawjeh"};
  const k=KEY[dim]||"salesManager";
  const m={};
  rows.forEach(r=>{
    const key=r[k]||"N/A";
    if(!m[key])m[key]={name:key,sales:0,qty:0};
    m[key].sales+=r.totalValVAT/1.14;
    m[key].qty+=r.qty;
  });
  return Object.values(m).sort((a,b)=>b.sales-a.sales).slice(0,10)
    .map(d=>({...d,sales:Math.round(d.sales),qty:Math.round(d.qty),
      shortName:d.name.length>14?d.name.slice(0,14)+"…":d.name}));
}
function getCountryData(rows){
  const m={};
  rows.forEach(r=>{
    if(!m[r.country])m[r.country]={country:r.country,sales:0,qty:0};
    m[r.country].sales+=r.totalValVAT/1.14;
    m[r.country].qty+=r.qty;
  });
  return Object.values(m).sort((a,b)=>b.sales-a.sales).slice(0,10)
    .map(d=>({...d,sales:Math.round(d.sales),qty:Math.round(d.qty)}));
}
function getPriceTrendData(rows){
  const fams=[...new Set(rows.map(r=>r.family))].slice(0,5);
  const mo={};
  rows.forEach(r=>{
    const k=r.deliveryDate.slice(0,7);
    if(!mo[k])mo[k]={mo:new Date(k+"-01").toLocaleDateString("en-US",{month:"short",year:"2-digit"}),raw:k};
    if(!mo[k][r.family+"_s"])mo[k][r.family+"_s"]=0;
    if(!mo[k][r.family+"_q"])mo[k][r.family+"_q"]=0;
    mo[k][r.family+"_s"]+=r.totalInv*r.rate;
    mo[k][r.family+"_q"]+=r.qty;
  });
  const data=Object.values(mo).sort((a,b)=>a.raw.localeCompare(b.raw))
    .map(row=>{
      const out={mo:row.mo};
      fams.forEach(f=>{out[f]=row[f+"_q"]>0?+(row[f+"_s"]/row[f+"_q"]).toFixed(2):null});
      return out;
    });
  return{data,fams};
}
function getPendCustData(rows){
  const m={};
  rows.forEach(r=>{
    const k=r.customer;
    if(!m[k])m[k]={name:k.split(" ").slice(0,2).join(" "),remQty:0,remAmt:0};
    m[k].remQty+=r.remQty;m[k].remAmt+=r.remAmt;
  });
  return Object.values(m).sort((a,b)=>b.remAmt-a.remAmt).slice(0,9)
    .map(d=>({...d,remQty:Math.round(d.remQty),remAmt:Math.round(d.remAmt)}));
}
function getPendFamData(rows){
  const m={};
  rows.forEach(r=>{
    if(!m[r.family])m[r.family]={family:r.family,remQty:0,remAmt:0};
    m[r.family].remQty+=r.remQty;m[r.family].remAmt+=r.remAmt;
  });
  return Object.values(m).sort((a,b)=>b.remAmt-a.remAmt)
    .map(d=>({...d,remQty:Math.round(d.remQty),remAmt:Math.round(d.remAmt)}));
}

/* ═══════════════════════════════════════════════
   SHARED TOOLTIP
═══════════════════════════════════════════════ */
function ChartTip({active,payload,label}){
  if(!active||!payload?.length)return null;
  return h("div",{style:{background:"#fff",border:`1px solid ${B.border}`,borderRadius:10,padding:"10px 14px",fontSize:12,boxShadow:"0 4px 20px rgba(0,0,0,.1)"}},

/* ═══════════════════════════════════════════════
   AI TAB
═══════════════════════════════════════════════ */
function AITab({user}){
  const salesRows=useMemo(()=>user.role==="manager"?SALES_DATA:SALES_DATA.filter(r=>r.salesManager===user.rep||r.salesperson===user.rep),[user]);
  const pendRows=useMemo(()=>user.role==="manager"?PENDING_DATA:PENDING_DATA.filter(r=>r.salesManager===user.rep||r.salesMan===user.rep),[user]);
  const sKPI=useMemo(()=>calcSalesKPIs(salesRows),[salesRows]);
  const pKPI=useMemo(()=>calcPendingKPIs(pendRows),[pendRows]);

  const [summary,setSummary]=useState("");const [sumLoading,setSumLoading]=useState(false);
  const [alerts,setAlerts]=useState([]);const [alertLoading,setAlertLoading]=useState(false);
  const [risks,setRisks]=useState([]);const [riskLoading,setRiskLoading]=useState(false);
  const [forecast,setForecast]=useState(null);const [foreLoading,setForeLoading]=useState(false);
  const [digest,setDigest]=useState("");const [digLoading,setDigLoading]=useState(false);
  const [copied,setCopied]=useState(false);
  const [messages,setMessages]=useState([]);const [chatLoading,setChatLoading]=useState(false);
  const [chatInput,setChatInput]=useState("");
  const chatRef=useRef(null);

  const ctx=`Egyptian British Co. — Specialty Chemicals & Auxiliaries.
Sales summary: ${salesRows.length} line items, ${sKPI.totalOrders} unique orders.
Total Qty: ${fmtK(sKPI.totalQty)} KG. Total Val (ex-VAT): ${fmtK(sKPI.totalValExVAT)} EGP.
Avg Price/KG (per-order avg): ${num(sKPI.avgPricePerOrder,2)} EGP. Weighted avg: ${num(sKPI.avgPriceWeighted,2)} EGP.
Best product: ${sKPI.bestProduct} (${fmtK(sKPI.bestProductQty)} KG).
Pending: ${pendRows.length} orders. Remaining Qty: ${fmtK(pKPI.totalRemQty)} KG. Remaining Amt: ${fmtK(pKPI.totalRemAmt)} EGP.
Top customers: ${[...new Set(salesRows.map(r=>r.customer))].slice(0,6).join(", ")}.
Families: ${[...new Set(salesRows.map(r=>r.family))].join(", ")}.
Products: ${[...new Set(salesRows.map(r=>r.product))].slice(0,8).join(", ")}.
Markets: ${[...new Set(salesRows.map(r=>r.market))].join(", ")}.
Countries: ${[...new Set(salesRows.map(r=>r.country))].slice(0,8).join(", ")}.`;

  const claude=async(prompt,system)=>{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:system||"You are a senior sales analytics advisor for Egyptian British Co., a specialty chemicals and auxiliaries company. Be precise, professional, and data-driven. Use EGP for currency. Keep responses concise.",
        messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    return d.content?.[0]?.text||"No response received.";
  };

  const genSummary=async()=>{setSumLoading(true);const r=await claude(`Write a 4-sentence professional performance summary for the sales team. Use specific numbers. Start with the headline metric. Context:\n${ctx}`);setSummary(r);setSumLoading(false);};
  const genAlerts=async()=>{
    setAlertLoading(true);
    const r=await claude(`Identify 4 specific anomalies, risks, or insights from this sales data. Format EXACTLY as:\nTYPE|MESSAGE\nWhere TYPE is one of: warn, danger, info, good\nContext:\n${ctx}`,"Return only the formatted lines. No intro, no conclusion.");
    const parsed=r.split("\n").filter(l=>l.includes("|")).map(l=>{const[t,...rest]=l.split("|");return{type:t.trim().toLowerCase(),msg:rest.join("|").trim()};});
    setAlerts(parsed.length?parsed:[{type:"info",msg:r}]);
    setAlertLoading(false);
  };
  const genRisks=async()=>{
    setRiskLoading(true);
    const pCtx=`Pending orders data: ${pendRows.length} open orders. Total remaining: ${fmtK(pKPI.totalRemAmt)} EGP, ${fmtK(pKPI.totalRemQty)} KG. Statuses: ${[...new Set(pendRows.map(r=>r.status))].join(", ")}. Top customers with pending: ${[...new Set(pendRows.map(r=>r.customer))].slice(0,5).join(", ")}.`;
    const r=await claude(`Identify 4 specific risks or urgent items in these pending orders. Format EXACTLY as:\nTYPE|MESSAGE\nWhere TYPE is: warn, danger, info, or good.\nData:\n${pCtx}`,"Return only formatted lines. No extra text.");
    const parsed=r.split("\n").filter(l=>l.includes("|")).map(l=>{const[t,...rest]=l.split("|");return{type:t.trim().toLowerCase(),msg:rest.join("|").trim()};});
    setRisks(parsed.length?parsed:[{type:"warn",msg:r}]);
    setRiskLoading(false);
  };
  const genForecast=async()=>{
    setForeLoading(true);
    const r=await claude(`Based on this sales context, provide a next-month revenue forecast. Return ONLY valid JSON:\n{"value":"XXM or XXXK","confidence":"XX%","trend":"up/flat/down","notes":"2 sentence explanation"}\nContext:\n${ctx}`,"Return only valid JSON. No markdown, no extra text.");
    try{const j=JSON.parse(r.replace(/```json|```/g,"").trim());setForecast(j);}
    catch{setForecast({value:"~"+fmtK(sKPI.totalValExVAT*0.95),confidence:"65%",trend:"flat",notes:r.slice(0,150)});}
    setForeLoading(false);
  };
  const genDigest=async()=>{
    setDigLoading(true);
    const r=await claude(`Write a weekly sales digest for Egyptian British Co. to share with the team. Professional, clear, under 180 words. Include: key metrics this period, top performers, notable trends, and 2 action points. Use this data:\n${ctx}`,"Write as plain text suitable for email or messaging. No markdown headers.");
    setDigest(r);setDigLoading(false);
  };
  const sendChat=async()=>{
    const msg=chatInput.trim();if(!msg||chatLoading)return;
    setChatInput("");
    setMessages(prev=>[...prev,{role:"user",content:msg}]);
    setChatLoading(true);
    const r=await claude(`Answer this question about the sales data. Be specific with numbers. Max 3 sentences.\nQuestion: ${msg}\nData context:\n${ctx}`,"You are a sales data analyst for Egyptian British Co. Answer concisely with specific numbers. Max 3 sentences.");
    setMessages(prev=>[...prev,{role:"ai",content:r}]);
    setChatLoading(false);
  };
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages,chatLoading]);

  const QUICK_Qs=["Who is the top salesperson?","Which family has the highest avg price/KG?","What is the largest pending customer?","Compare Cairo vs export performance"];

  const AIPanelHeader=({title,sub,onGen,loading,btnLabel="Generate"})=>
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      h("div",null,
        h("div",{className:"st",style:{marginBottom:2}},title),
        h("p",{style:{fontSize:11,color:B.muted}},sub)),
      h("button",{className:"btn btn-outline",onClick:onGen,disabled:loading,style:{fontSize:11,minWidth:90}},
        loading?h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"spin"}),"…"):btnLabel)
    );

  return h("div",null,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}},
      h("div",null,
        h("h1",{style:{fontFamily:"'DM Serif Display',serif",fontSize:24,color:B.text}},"AI Insights"),
        h("p",{style:{fontSize:11.5,color:B.muted,marginTop:3}},"Powered by Claude AI · Analyzing your live EBC sales & pending data")),
      h("button",{className:"btn btn-blue",onClick:()=>{genSummary();genAlerts();genRisks();genForecast();}},
        "↻ Refresh All")
    ),

    // Row 1: Summary full width
    h("div",{className:"card",style:{marginBottom:14}},
      h(AIPanelHeader,{title:"📋 Performance Summary",sub:"Auto-generated narrative from your current sales data",onGen:genSummary,loading:sumLoading,btnLabel:"Generate"}),
      h("div",{style:{minHeight:72,background:B.blueLL,borderRadius:10,border:`1px solid ${B.border}`,padding:"14px 16px",fontSize:13,lineHeight:1.8,color:B.text}},
        sumLoading?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted}},h("span",{className:"spin"}),"Generating summary…"):
        summary||h("span",{style:{color:B.subtle}},"Click Generate to create an AI-powered summary of your sales performance.")
      )
    ),

    // Row 2: Anomalies + Pending Risks
    h("div",{className:"grid2",style:{marginBottom:14}},
      h("div",{className:"card"},
        h(AIPanelHeader,{title:"⚠️ Anomaly Detection",sub:"Unusual patterns flagged automatically",onGen:genAlerts,loading:alertLoading,btnLabel:"Detect"}),
        alertLoading?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted,padding:"16px 0"}},h("span",{className:"spin"}),"Scanning data…"):
        alerts.length?h("div",null,alerts.map((a,i)=>h("div",{key:i,className:`ai-alert ai-${a.type}`},a.msg))):
        h("div",{style:{color:B.subtle,fontSize:12.5,padding:"10px 0"}},"Click Detect to scan for anomalies, unusual patterns, or notable trends in your sales data.")
      ),
      h("div",{className:"card"},
        h(AIPanelHeader,{title:"🚨 Pending Orders Risk",sub:"High-priority items needing attention",onGen:genRisks,loading:riskLoading,btnLabel:"Analyze"}),
        riskLoading?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted,padding:"16px 0"}},h("span",{className:"spin"}),"Analyzing pending orders…"):
        risks.length?h("div",null,risks.map((r,i)=>h("div",{key:i,className:`ai-alert ai-${r.type}`},r.msg))):
        h("div",{style:{color:B.subtle,fontSize:12.5,padding:"10px 0"}},"Click Analyze to identify high-value delayed orders and at-risk pending shipments.")
      )
    ),

    // Row 3: Forecast + Digest
    h("div",{className:"grid2",style:{marginBottom:14}},
      h("div",{className:"card"},
        h(AIPanelHeader,{title:"📈 Next Month Forecast",sub:"AI-driven revenue projection",onGen:genForecast,loading:foreLoading,btnLabel:"Forecast"}),
        foreLoading?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted,padding:"16px 0"}},h("span",{className:"spin"}),"Building forecast model…"):
        forecast?h("div",null,
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}},
            h("div",{style:{background:B.blueL,borderRadius:10,padding:"12px 14px",textAlign:"center"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:B.blue,letterSpacing:".07em",marginBottom:4}},"FORECAST"),
              h("div",{style:{fontSize:22,fontWeight:800,color:B.blue,fontFamily:"'DM Serif Display',serif"}},forecast.value)),
            h("div",{style:{background:B.greenL,borderRadius:10,padding:"12px 14px",textAlign:"center"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:B.green,letterSpacing:".07em",marginBottom:4}},"CONFIDENCE"),
              h("div",{style:{fontSize:22,fontWeight:800,color:B.green,fontFamily:"'DM Serif Display',serif"}},forecast.confidence)),
            h("div",{style:{background:forecast.trend==="up"?B.greenL:forecast.trend==="down"?B.redL:B.blueLL,borderRadius:10,padding:"12px 14px",textAlign:"center"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:B.muted,letterSpacing:".07em",marginBottom:4}},"TREND"),
              h("div",{style:{fontSize:22,fontWeight:800,color:B.text}},forecast.trend==="up"?"↑":forecast.trend==="down"?"↓":"→"))
          ),
          h("p",{style:{fontSize:12.5,color:B.muted,lineHeight:1.7}},forecast.notes)
        ):
        h("div",{style:{color:B.subtle,fontSize:12.5,padding:"10px 0"}},"Click Forecast to project next month's revenue based on historical trends and current pipeline.")
      ),
      h("div",{className:"card"},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          h("div",null,
            h("div",{className:"st",style:{marginBottom:2}},"📨 Weekly Digest"),
            h("p",{style:{fontSize:11,color:B.muted}},"Ready to copy & paste into email or WhatsApp")),
          h("div",{style:{display:"flex",gap:6}},
            digest&&h("button",{className:"btn btn-ghost",onClick:()=>{navigator.clipboard.writeText(digest);setCopied(true);setTimeout(()=>setCopied(false),2000);},style:{fontSize:11}},copied?"✓ Copied!":"📋 Copy"),
            h("button",{className:"btn btn-outline",onClick:genDigest,disabled:digLoading,style:{fontSize:11}},
              digLoading?h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"spin"}),"…"):"Generate")
          )
        ),
        h("div",{style:{minHeight:130,background:"#FAFBFD",borderRadius:10,border:`1px solid ${B.border}`,padding:"13px 15px",fontSize:12.5,lineHeight:1.8,color:B.text,whiteSpace:"pre-wrap",overflowY:"auto",maxHeight:200}},
          digLoading?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted}},h("span",{className:"spin"}),"Drafting digest…"):
          digest||h("span",{style:{color:B.subtle}},"Click Generate to draft a professional weekly summary ready to share with your team.")
        )
      )
    ),

    // Row 4: Ask Your Data
    h("div",{className:"card"},
      h("div",{className:"st",style:{marginBottom:4}},"💬 Ask Your Data"),
      h("p",{style:{fontSize:11.5,color:B.muted,marginBottom:14}},`Ask anything about your sales data in plain language. Examples: "Who is my top rep in Egypt?" · "Which family has highest price/KG?" · "What's the status of pending Textile orders?"`),
      h("div",{ref:chatRef,style:{maxHeight:300,overflowY:"auto",marginBottom:12,padding:"4px 0",scrollBehavior:"smooth"}},
        messages.length===0&&!chatLoading&&h("div",{style:{textAlign:"center",padding:"28px 0",color:B.subtle,fontSize:13}},"Ask a question below to get instant AI-powered answers from your data"),
        messages.map((m,i)=>h("div",{key:i,className:`chat-bubble chat-${m.role}`,style:m.role==="user"?{marginLeft:"auto",background:B.blue,color:"#fff"}:{background:"#F1F5F9",color:B.text}},m.content)),
        chatLoading&&h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"10px 0",color:B.muted,fontSize:13}},h("span",{className:"spin"}),"Analyzing your data…")
      ),
      h("div",{style:{display:"flex",gap:8,marginBottom:10}},
        h("input",{value:chatInput,onChange:e=>setChatInput(e.target.value),onKeyDown:e=>{if(e.key==="Enter")sendChat();},
          placeholder:"e.g. Which region has the highest avg price per KG?",
          style:{flex:1,padding:"10px 14px",border:`1.5px solid ${B.border}`,borderRadius:10,fontSize:13,color:B.text,outline:"none"}}),
        h("button",{className:"btn btn-blue",onClick:sendChat,disabled:chatLoading||!chatInput.trim(),style:{whiteSpace:"nowrap",padding:"10px 18px"}},"Send →")
      ),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
        QUICK_Qs.map(q=>h("button",{key:q,onClick:()=>{setChatInput(q);},
          style:{padding:"5px 12px",borderRadius:7,border:`1px solid ${B.border}`,background:B.blueLL,color:B.blue,fontSize:11,cursor:"pointer",fontWeight:600}},q))
      )
    )
  );
}

/* ═══════════════════════════════════════════════
   PRINT AREA
═══════════════════════════════════════════════ */
function PrintArea(){
  return h("div",{id:"print-area",style:{display:"none",padding:24,fontFamily:"'Plus Jakarta Sans',sans-serif"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:20,borderBottom:`2px solid ${B.border}`,paddingBottom:16}},
      h("div",{style:{width:40,height:40,borderRadius:10,background:`linear-gradient(135deg,${B.blue},${B.red})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800}},"E"),
      h("div",null,
        h("div",{style:{fontSize:17,fontWeight:800}},h("span",{style:{color:B.blue}},"Egyptian "),h("span",{style:{color:B.red}},"British Co.")),
        h("div",{style:{fontSize:11,color:B.subtle}},`Specialty Chemicals & Auxiliaries · Pending Orders Report · ${new Date().toLocaleDateString("en-GB")}`)
      )
    ),
    h("h2",{style:{fontSize:16,fontWeight:700,marginBottom:16,color:B.text}},"Pending Sales Orders"),
    h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
      h("thead",null,h("tr",{style:{background:B.blueL}},
        ["Order Date","Customer","Country","Product","Family","Req Qty (KG)","Del Qty (KG)","Rem Qty (KG)","Price ex-VAT","Rem Amt (EGP)","Status","Payment Terms"]
          .map(c=>h("th",{key:c,style:{padding:"7px 8px",textAlign:"left",color:B.blue,fontWeight:700,border:`1px solid ${B.border}`,fontSize:10}},c))
      )),
      h("tbody",{id:"print-tbody"})
    ),
    h("div",{style:{marginTop:18,fontSize:10,color:B.subtle,borderTop:`1px solid ${B.border}`,paddingTop:10}},`Generated: ${new Date().toLocaleString("en-GB")} · Egyptian British Co. — Confidential Document`)
  );
}

/* ═══════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("sales");

  if(!user)return h(Login,{onLogin:u=>{setUser(u);setTab("sales");}});

  const TABS=[["sales","📊 Sales Dashboard"],["pending","🔄 Pending Orders"],["ai","🤖 AI Insights"]];

  return h("div",{id:"main-app"},
    h(Header,{user,onLogout:()=>setUser(null)}),
    h("div",{style:{background:"#fff",borderBottom:`1px solid ${B.border}`}},
      h("div",{style:{maxWidth:1480,margin:"0 auto",padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}},
        TABS.map(([k,l])=>h("button",{key:k,className:`tab-btn${tab===k?" active":""}`,onClick:()=>setTab(k)},l))
      )
    ),
    h("div",{className:"page"},
      tab==="sales"&&h(SalesTab,{user}),
      tab==="pending"&&h(PendingTab,{user}),
      tab==="ai"&&h(AITab,{user})
    ),
    h("div",{style:{textAlign:"center",padding:"12px 0 20px",color:B.subtle,fontSize:11,borderTop:`1px solid ${B.border}`,marginTop:8}},
      h("span",{style:{fontWeight:700}},h("span",{style:{color:B.blue}},"Egyptian "),h("span",{style:{color:B.red}},"British Co."))," · Sales Intelligence Portal · Google Drive Sync: 10:00 AM & 4:30 PM daily · ",
      user.role==="rep"?`RLS active — ${user.rep} view`:"Full manager access"
    ),
    h(PrintArea,null)
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
</body>
</html>
