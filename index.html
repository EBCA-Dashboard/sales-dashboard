<canvas id="mol-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
<script>
(function(){
  var canvas = document.getElementById("mol-canvas");
  var ctx = canvas.getContext("2d");
  var W, H;
  var nodes = [];
  var NODE_COUNT = 18;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  function randBetween(a,b){ return a + Math.random()*(b-a); }

  /* Smaller varied sizes: small (3-5), medium (7-9), large (11-14) */
  var sizePool = [3,4,5, 7,8,9, 11,12,13,14];
  for(var i=0;i<NODE_COUNT;i++){
    var sz = sizePool[Math.floor(Math.random()*sizePool.length)];
    var speed = randBetween(0.5, 1.2);
    var angle = Math.random() * Math.PI * 2;
    nodes.push({
      x: randBetween(0, W),
      y: randBetween(0, H),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: sz
    });
  }

  var LINK_DIST = 220;
  var LINE_COL  = "rgba(21,101,192,";

  function draw(){
    ctx.clearRect(0,0,W,H);

    /* bond lines */
    for(var a=0;a<nodes.length;a++){
      for(var b=a+1;b<nodes.length;b++){
        var dx = nodes[b].x - nodes[a].x;
        var dy = nodes[b].y - nodes[a].y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < LINK_DIST){
          var alpha = (1 - dist/LINK_DIST) * 0.60;
          ctx.beginPath();
          ctx.moveTo(nodes[a].x, nodes[a].y);
          ctx.lineTo(nodes[b].x, nodes[b].y);
          ctx.strokeStyle = LINE_COL + alpha + ")";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }

    /* solid nodes */
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      /* outer glow ring */
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 3, 0, Math.PI*2);
      ctx.fillStyle = "rgba(21,101,192,0.12)";
      ctx.fill();
      /* solid filled circle */
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = "rgba(21,101,192,0.82)";
      ctx.fill();
      ctx.strokeStyle = "rgba(21,101,192,1)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  function update(){
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      n.x += n.vx;
      n.y += n.vy;
      /* wrap around edges with a small buffer */
      if(n.x < -20)  n.x = W + 20;
      if(n.x > W+20) n.x = -20;
      if(n.y < -20)  n.y = H + 20;
      if(n.y > H+20) n.y = -20;
    }
  }

  function loop(){
    update();
    if(window.molVisible !== false){ draw(); }
    else { ctx.clearRect(0,0,W,H); }
    requestAnimationFrame(loop);
  }
  window.molVisible = false;
  window.showMol = function(){ window.molVisible = true; canvas.style.display="block"; };
  window.hideMol = function(){ window.molVisible = false; ctx.clearRect(0,0,W,H); canvas.style.display="none"; };
  canvas.style.display = "none"; /* hidden until login page explicitly shows it */
  loop();
})();
</script>

function startApp(){
var h=React.createElement,useState=React.useState,useMemo=React.useMemo,useRef=React.useRef,useEffect=React.useEffect,RC=Recharts;

/* ── BRAND ── */
var B={
  blue:"#1565C0",blue2:"#1976D2",blueL:"#E3F2FD",blueLL:"#F0F7FF",

  fpal:["#1565C0","#D32F2F","#C2185B","#F57F17","#6A1B9A","#00838F"]
};
var MON=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* ── NUMBER PARSER ── handles commas, spaces, scientific notation ── */
/* ── VERIFIED NUMBER PARSER ── */
function pn(s){
  if(s===null||s===undefined||s==="")return 0;
  if(typeof s==="number")return isNaN(s)?0:s;
  var c=String(s).replace(/,/g,"").replace(/\s/g,"").trim();
  // scientific notation like 2.0262E+10 — keep as number but cap at sane values
  var v=parseFloat(c);
  return isNaN(v)?0:v;
}
function num(n,d){
  if(n===null||n===undefined)return"-";d=d||0;
  return new Intl.NumberFormat("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
}
function fK(n){
  if(n===null||n===undefined)return"-";
  if(Math.abs(n)>=1e6)return num(n/1e6,2)+"M";
  if(Math.abs(n)>=1e3)return num(n/1e3,1)+"K";
  return num(n,0);
}

/* ── DATE PARSER ── handles DD-Mon-YY, DD/MM/YYYY, YYYY-MM-DD ── */
var MMAP={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
function parseDate(s){
  if(!s)return null;
  s=String(s).trim();
  // DD-Mon-YY  e.g. "11-May-26" or "11-May-2026"
  var m=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{2,4})$/);
  if(m){
    var mo=MMAP[m[2].toLowerCase()];
    if(mo){var yr=parseInt(m[3]);if(yr<100)yr+=2000;return new Date(yr,mo-1,parseInt(m[1]));}
  }
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return new Date(s);
  // DD/MM/YYYY
  var m2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m2)return new Date(parseInt(m2[3]),parseInt(m2[2])-1,parseInt(m2[1]));
  var d=new Date(s);return isNaN(d)?null:d;
}
function fD(s){var d=parseDate(s);if(!d)return s||"-";return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});}

/* ── FETCH SHEET ── */
async function fetchSheet(id,name){
  var url="https://sheets.googleapis.com/v4/spreadsheets/"+id+"/values/"+encodeURIComponent(name)+"?key="+CONFIG.GOOGLE_API_KEY;
  var controller = typeof AbortController !== "undefined" ? new AbortController() : null;
  var timer = controller ? setTimeout(function(){ controller.abort(); }, 20000) : null;
  var r = await fetch(url, controller ? {signal: controller.signal} : {});
  if(timer) clearTimeout(timer);
  if(!r.ok)throw new Error("Sheet '"+name+"' error "+r.status+". Check ID and sharing.");
  var d=await r.json();
  var rows=d.values||[];
  if(rows.length<2)return[];
  var hdrs=rows[0].map(function(h){return String(h).trim();});
  return rows.slice(1).filter(function(row){return row.some(function(c){return c!==null&&c!==undefined&&String(c).trim()!=="";});})
    .map(function(row){var o={};hdrs.forEach(function(hd,i){o[hd]=row[i]!==undefined?String(row[i]).trim():"";});return o;});
}

/* ── NORMALIZER: SALES VIEW ── */
function normS(r){
  var d=parseDate(r["Delivery Date"]||"");
  var od=parseDate(r["Order date"]||"");
  var qty=pn(r["Qty. (kg.)"]);
  var totalValVAT=pn(r["Total Val. EGP + VAT"]);
  return{
    orderNo:     r["Order - No"]||"",
    orderDate:   r["Order date"]||"",
    orderDateObj:od,
    delivDate:   r["Delivery Date"]||"",
    delivDateObj:d,
    delivYear:   d?String(d.getFullYear()):"",
    delivMonth:  d?String(d.getMonth()+1):"",
    erpNum:      r["ERP Num."]||"",
    invNo:       r["Inv. No."]||"",
    customer:    r["Customer Name"]||"",
    country:     r["Country"]||"",
    custCode:    r["Customer Code"]||"",
    custType:    r["Customer Type"]||"",
    market:      r["Market"]||"",
    tawjeh:      r["\u0627\u0644\u062a\u0648\u062c\u064a\u0647"]||"",
    product:     r["Product Name"]||"",
    family:      r["Family"]||"",
    base:        r["Base"]||"",
    salesPrice:  pn(r["Sales Price"]),
    qty:         qty,
    totalInv:    pn(r["Total Sales Inv"]),
    currency:    r["Currency"]||"",
    rate:        pn(r["Rate"])||1,
    priceMod:    pn(r["Price Modification EGP"]),
    totalValVAT: totalValVAT,
    paymentTerms:r["Payment Terms"]||"",
    salesManager:r["Sales Manager"]||"",
    salesperson: r["Salesperson"]||"",
    remarks:     r["Remarks"]||""
  };
}
function normP(r){
  return{
    base:r["Base"]||"",region:r["Region"]||"",custType:r["Customer Type"]||"",family:r["Family"]||"",
    salesManager:r["Sales Manager"]||"",salesMan:r["Sales Man"]||"",serNo:r["Ser. No."]||"",
    custCode:r["Customer Code"]||"",oracleCode:r["Oracle / Code"]||"",orderDate:r["Order Date"]||"",
    customer:r["Customer"]||"",country:r["Country"]||"",incoterm:r["Incoterm"]||"",product:r["Product"]||"",
    reqQty:pn(r["Total Requested Qty. (K.G)"]),delQty:pn(r["Del. Qty. (K.G)"]),remQty:pn(r["Remaining Qty. (K.G)"]),
    priceExVAT:pn(r["Price Excluding(VAT)"]),priceInVAT:pn(r["Price Including (VAT)"]),
    currency:r["Currency"]||"",rate:pn(r["Rate"])||1,
    totNoVAT:pn(r["Total Price without VAT (EGP)"]),remAmt:pn(r["Remaining Amount without VAT (EGP)"]),
    totWithVAT:pn(r["Total Price With VAT (All Currencies)"]),status:r["Status / Order"]||"",
    paymentTerms:r["Payment Terms"]||"",remarks:r["Remarks"]||"",market:r["Market"]||""
  };
}
function normR(r){
  var e    = r["email"]||r["Outlook Email"]||r["Email"]||"";

  return{

  };
}

/* ── KPI CALCULATIONS ──
   Total Qty     = SUM of Qty. (kg.) column
   Total Val     = SUM of "Total Val. EGP + VAT" column directly (no VAT adjustment)
   Avg Price/KG  = Total Val / Total Qty  (simple financial average)
   Total Orders  = COUNT of unique (Customer Name + Order date) combinations
   Best Product  = Product with highest aggregated SUM of qty (SUMIF logic)
*/
function calcSKPI(rows){
  var tQty=0,tVal=0,orderKeys=new Set(),prodQty={};
  rows.forEach(function(r){
    tQty+=r.qty;
    tVal+=r.totalValVAT;
    orderKeys.add(r.customer+"||"+r.orderDate);
    prodQty[r.product]=(prodQty[r.product]||0)+r.qty;
  });
  var avg=tQty>0?tVal/tQty:0;
  var bestProd="--",bestQty=0;
  Object.keys(prodQty).forEach(function(p){if(prodQty[p]>bestQty){bestQty=prodQty[p];bestProd=p;}});
  return{totalQty:tQty,totalVal:tVal,avgPrice:avg,totalOrders:orderKeys.size,bestProd:bestProd,bestQty:bestQty};
}
function calcPKPI(rows,activeStatus){
  var rQ=0,rA=0,tRQ=0,tRV=0;
  rows.forEach(function(r){rQ+=r.remQty;rA+=r.remAmt;tRQ+=r.reqQty;tRV+=r.totNoVAT;});
  var OPEN=["pending","annual pending","on hold","in process"];
  var openOrders;
  if(!activeStatus||activeStatus==="all"){
    openOrders=rows.filter(function(r){return OPEN.indexOf((r.status||"").toLowerCase().trim())>=0;}).length;
  }else{
    openOrders=rows.length;
  }
  return{remQty:rQ,remAmt:rA,avgPrice:tRQ>0?tRV/tRQ:0,total:rows.length,openOrders:openOrders};
}

/* ── CHART DATA ── */
function getDimData(rows,dim){
  var m={};
  rows.forEach(function(r){var k=r[dim]||"N/A";if(!m[k])m[k]={name:k,sales:0,qty:0};m[k].sales+=r.totalValVAT;m[k].qty+=r.qty;});
  return Object.values(m).sort(function(a,b){return b.sales-a.sales;}).slice(0,10)
    .map(function(d){return{name:d.name.length>14?d.name.slice(0,14)+"...":d.name,sales:Math.round(d.sales),qty:Math.round(d.qty)};});
}
function getCountryData(rows){
  var m={};
  rows.forEach(function(r){if(!m[r.country])m[r.country]={country:r.country,sales:0,qty:0};m[r.country].sales+=r.totalValVAT;m[r.country].qty+=r.qty;});
  return Object.values(m).sort(function(a,b){return b.sales-a.sales;}).slice(0,10)
    .map(function(d){return{country:d.country,sales:Math.round(d.sales),qty:Math.round(d.qty)};});
}
function getTrendData(rows){
  // Top 6 families by total qty (SUMIF equivalent)
  var fQ={};
  rows.forEach(function(r){fQ[r.family]=(fQ[r.family]||0)+r.qty;});
  var fams=Object.keys(fQ).sort(function(a,b){return fQ[b]-fQ[a];}).slice(0,6);
  var mo={};
  rows.forEach(function(r){
    if(!r.delivDateObj)return;
    var yr=r.delivYear,mn=r.delivMonth.length===1?"0"+r.delivMonth:r.delivMonth;
    var k=yr+"-"+mn;
    if(!mo[k])mo[k]={mo:r.delivDateObj.toLocaleDateString("en-US",{month:"short",year:"2-digit"}),raw:k};
    if(fams.indexOf(r.family)>=0){
      mo[k][r.family+"_s"]=(mo[k][r.family+"_s"]||0)+r.totalValVAT;
      mo[k][r.family+"_q"]=(mo[k][r.family+"_q"]||0)+r.qty;
    }

function MultiSelect(props){

    ),
    open && h("div",{style:{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:50,background:"#fff",border:"1px solid var(--border)",borderRadius:10,boxShadow:"0 8px 24px rgba(15,28,46,.12)",minWidth:200,maxHeight:280,overflowY:"auto",padding:6}},
      h("div",{onClick:clearAll,style:{padding:"7px 10px",fontSize:12,fontWeight:700,color:allSelected?B.blue2:B.muted,cursor:"pointer",borderRadius:7,background:allSelected?B.blueL:"transparent"}}, props.allLabel),

}

function App(){
  var s1=useState(null);    var user=s1[0];        var setUser=s1[1];
  var s2=useState("sales"); var tab=s2[0];         var setTab=s2[1];
  var s3=useState(true);    var loading=s3[0];     var setLoading=s3[1];
  var s4=useState("Connecting to Google Drive..."); var loadMsg=s4[0]; var setLoadMsg=s4[1];
  var s5=useState(null);    var error=s5[0];       var setError=s5[1];
  var s6=useState([]);      var salesData=s6[0];   var setSalesData=s6[1];
  var s7=useState([]);      var pendingData=s7[0]; var setPendingData=s7[1];
  var s8=useState([]);      var rlsUsers=s8[0];    var setRlsUsers=s8[1];
  var s9=useState(null);    var lastSync=s9[0];    var setLastSync=s9[1];

  useEffect(function(){
    var show = !user && !loading && !error;
    if(show){ if(window.showMol) window.showMol(); }
    else     { if(window.hideMol) window.hideMol(); }
  }, [user, loading, error]);

  useEffect(function(){
    var ok = CONFIG.GOOGLE_API_KEY && CONFIG.GOOGLE_API_KEY !== "YOUR_GOOGLE_API_KEY";
    if(!ok){ setError("SETUP"); setLoading(false); return; }
    async function load(){
      try{
        setLoadMsg("Loading Sales View...");
        var sr = await fetchSheet(CONFIG.SALES_SHEET_ID, "Sales View");
        setSalesData(sr.map(normS));
        setLoadMsg("Loading Pending Sales...");
        var pr = await fetchSheet(CONFIG.PENDING_SHEET_ID, "Pending Sales");
        setPendingData(pr.map(normP));
        setLoadMsg("Loading RLS config...");
        var rr = await fetchSheet(CONFIG.RLS_SHEET_ID, "RLS Config");
        setRlsUsers(rr.map(normR));
        setLastSync(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
        setLoading(false);
      } catch(e){ setError(e.message); setLoading(false); }
    }
    load();
  }, []);

  // LOADING SCREEN
  if(loading){
    return h("div",{className:"ls"},
      h(Logo,{size:"lg",center:true}),
      h("div",{className:"bs",style:{marginTop:16}}),
      h("p",{style:{color:B.muted,fontSize:14,fontWeight:500,marginTop:8}},loadMsg)
    );
  }

  // SETUP SCREEN - keys not filled in
  if(error === "SETUP"){
    return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:B.bg,padding:20}},
      h("div",{style:{background:"#fff",border:"2px solid #FDE68A",borderRadius:18,padding:"40px 36px",maxWidth:520,textAlign:"center",boxShadow:"0 12px 48px rgba(0,0,0,.08)"}},
        h(Logo,{size:"lg"}),
        h("div",{style:{fontSize:28,margin:"20px 0",fontWeight:700,color:B.amber}},"Setup Required"),
        h("p",{style:{fontSize:13.5,color:B.muted,lineHeight:1.8,marginBottom:20}},
          "Open index.html in Notepad and fill in your 5 API keys in the CONFIG block at the top of the file, then re-upload to GitHub."),
        h("div",{style:{background:"#0F1C2E",color:"#E2E8F0",borderRadius:10,padding:"16px 20px",textAlign:"left",fontSize:12,fontFamily:"monospace",lineHeight:2.2}},
          h("div",null,h("span",{style:{color:"#90CAF9"}},"GOOGLE_API_KEY"),":   your key from Google Cloud Console"),
          h("div",null,h("span",{style:{color:"#90CAF9"}},"SALES_SHEET_ID"),":  your Sales View sheet ID"),
          h("div",null,h("span",{style:{color:"#90CAF9"}},"PENDING_SHEET_ID"),": your Pending Sales sheet ID"),
          h("div",null,h("span",{style:{color:"#90CAF9"}},"RLS_SHEET_ID"),":    your RLS Config sheet ID"),
          h("div",null,h("span",{style:{color:"#90CAF9"}},"ANTHROPIC_KEY"),":   your key from console.anthropic.com")
        )
      )
    );
  }

  // CONNECTION ERROR SCREEN
  if(error){
    return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:B.bg,padding:20}},
      h("div",{style:{background:"#fff",border:"2px solid #FECACA",borderRadius:18,padding:"40px 36px",maxWidth:540,textAlign:"center",boxShadow:"0 8px 32px rgba(0,0,0,.08)"}},
        h(Logo,{size:"lg"}),
        h("div",{style:{fontSize:22,fontWeight:700,color:B.red2,margin:"20px 0"}},"Connection Error"),
        h("p",{style:{color:B.red2,fontSize:13.5,marginBottom:16,fontWeight:600,lineHeight:1.6}},error),
        h("div",{style:{background:B.blueLL,borderRadius:10,padding:"14px 16px",fontSize:13,color:B.muted,textAlign:"left",lineHeight:2}},
          h("div",null,"1. Check all 3 Sheet IDs are correct"),
          h("div",null,"2. All 3 sheets shared as Anyone with link can view"),
          h("div",null,"3. Google API key valid and Sheets API enabled"),
          h("div",null,"4. Tab names match exactly: Sales View / Pending Sales / RLS Config")
        )
      )
    );
  }

  // LOGIN
  if(!user){
    return h("div",null,
      h(LoginPage,{rlsUsers:rlsUsers, onLogin:function(u){setUser(u);setTab("sales");}}),
      h(PrintArea)
    );
  }

  // MAIN DASHBOARD
  var TABS = user.role==="manager"
    ? [["sales","Sales Dashboard"],["pending","Pending Orders"],["ai","AI Insights"]]
    : [["sales","Sales Dashboard"],["pending","Pending Orders"]];
  return h("div",{id:"app"},
    h(Header,{user:user, onLogout:function(){setUser(null);}, lastSync:lastSync}),
    h("div",{style:{background:"#fff",borderBottom:"1px solid "+B.border}},
      h("div",{style:{maxWidth:1480,margin:"0 auto",padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}},
        TABS.map(function(t){
          return h("button",{key:t[0], className:"tab"+(tab===t[0]?" on":""), onClick:function(){setTab(t[0]);}}, t[1]);
        })
      )
    ),
    h("div",{className:"page"},
      tab==="sales"   && h(SalesTab,  {user:user, salesData:salesData}),
      tab==="pending" && h(PendingTab, {user:user, pendingData:pendingData}),
      tab==="ai"      && h(AITab,     {user:user, salesData:salesData, pendingData:pendingData})
    ),
    h("div",{style:{textAlign:"center",padding:"12px 0 20px",color:B.subtle,fontSize:11,borderTop:"1px solid "+B.border,marginTop:8}},
      h("span",{style:{fontWeight:700}},
        h("span",{style:{color:B.blue2}},"Egyptian "),
        h("span",{style:{color:B.red2}},"British Co.")),
      " - Sales Intelligence Portal - ",
      user.role==="rep" ? "RLS Active: "+user.rep_name+" view only" : "Full Manager Access - All Data Visible"
    ),
    h(PrintArea)
  );
}

ReactDOM.render(h(App), document.getElementById("root"));

} // end startApp
