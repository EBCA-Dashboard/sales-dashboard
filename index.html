.bb{background:var(--blue);color:#fff}.bb:hover{background:#1255A0}
.bo{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}.bo:hover{background:var(--blue-l)}

.bg{background:transparent;color:var(--muted);border:1px solid var(--border)}.bg:hover{background:var(--bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.bbl{background:var(--blue-l);color:var(--blue)}.brl{background:var(--red-l);color:var(--red)}
.bgl{background:var(--green-l);color:var(--green)}.bay{background:#F1F5F9;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 11px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--subtle);border-bottom:2px solid var(--border);background:#FAFBFD;white-space:nowrap;text-transform:uppercase}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#F7FAFF}
.sl{padding:7px 11px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none}

.tab{padding:10px 18px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.dim{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.dim.on{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.aia{border-radius:10px;padding:11px 14px;margin-bottom:9px;font-size:12.5px;line-height:1.6;border-left:3px solid}
.aiw{background:var(--amber-l);border-color:#D97706;color:#78350F}
.aid{background:var(--red-l);border-color:var(--red);color:#7F1D1D}
.aii{background:var(--blue-l);border-color:var(--blue);color:#1E40AF}
.aig{background:var(--green-l);border-color:var(--green);color:#14532D}
.cbbl{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;max-width:85%;margin-bottom:8px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:rot .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}
.st{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.ls{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.bs{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:rot .8s linear infinite}
@media print{#app{display:none!important}#pa{display:block!important}body{background:#fff}}

function num(n,d){
  if(n==null) return "-";
  d = d||0;
  return new Intl.NumberFormat("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}).format(Math.round(n*Math.pow(10,d))/Math.pow(10,d));
}
function fK(n){
  if(n==null) return "-";
  if(n>=1e6) return num(n/1e6,1)+"M";
  if(n>=1e3) return num(n/1e3,1)+"K";
  return num(n);
}
function fD(s){
  if(!s) return "-";
  var d = new Date(s);
  if(isNaN(d)) return s;
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});
}

async function fetchSheet(sheetId, sheetName) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+"/values/"+encodeURIComponent(sheetName)+"?key="+CONFIG.GOOGLE_API_KEY;
  var res = await fetch(url);
  if(!res.ok) throw new Error("Sheet '"+sheetName+"' error "+res.status+". Check Sheet ID and sharing settings.");
  var data = await res.json();
  var rows = data.values || [];
  if(rows.length < 2) return [];
  var headers = rows[0].map(function(h){ return h.trim(); });
  return rows.slice(1).map(function(row){
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = row[i] !== undefined ? row[i] : ""; });
    return obj;
  });
}

  };

function calcSKPI(rows){
  var totalQty=0, totalVal=0, orderAvgs=[], orderKeys=new Set(), prodQty={};
  rows.forEach(function(r){
    totalQty += r.qty;
    totalVal += r.totalValVAT/1.14;
    if(r.qty>0) orderAvgs.push((r.totalInv*r.rate)/r.qty);
    orderKeys.add(r.customer+"||"+r.orderDate);
    prodQty[r.product] = (prodQty[r.product]||0) + r.qty;
  });
  var avgPO = orderAvgs.length ? orderAvgs.reduce(function(a,b){return a+b;},0)/orderAvgs.length : 0;
  var avgW = totalQty>0 ? totalVal/totalQty : 0;
  var best = Object.entries(prodQty).sort(function(a,b){return b[1]-a[1];})[0];
  return {totalQty:totalQty, totalVal:totalVal, avgPO:avgPO, avgW:avgW,
    totalOrders:orderKeys.size, bestProd:best?best[0]:"--", bestQty:best?best[1]:0};
}

function calcPKPI(rows){
  var remQty=0, remAmt=0, avgs=[];
  rows.forEach(function(r){
    remQty += r.remQty; remAmt += r.remAmt;
    if(r.reqQty>0) avgs.push(r.totNoVAT/r.reqQty);
  });
  var avg = avgs.length ? avgs.reduce(function(a,b){return a+b;},0)/avgs.length : 0;
  return {remQty:remQty, remAmt:remAmt, avg:avg, total:rows.length};
}

function getDimData(rows, dim){
  var m = {};
  rows.forEach(function(r){
    var k = r[dim]||"N/A";
    if(!m[k]) m[k]={name:k,sales:0,qty:0};
    m[k].sales += r.totalValVAT/1.14;
    m[k].qty += r.qty;
  });
  return Object.values(m).sort(function(a,b){return b.sales-a.sales;}).slice(0,10).map(function(d){
    return {name:d.name.length>13?d.name.slice(0,13)+"...":d.name, sales:Math.round(d.sales), qty:Math.round(d.qty)};
  });
}
function getCountryData(rows){
  var m={};
  rows.forEach(function(r){
    if(!m[r.country]) m[r.country]={country:r.country,sales:0};
    m[r.country].sales += r.totalValVAT/1.14;
  });
  return Object.values(m).sort(function(a,b){return b.sales-a.sales;}).slice(0,10).map(function(d){
    return {country:d.country, sales:Math.round(d.sales)};
  });
}
function getTrendData(rows){
  var fams = Array.from(new Set(rows.map(function(r){return r.family;}))).slice(0,5);
  var mo = {};
  rows.forEach(function(r){
    if(!r.deliveryDate) return;
    var k = r.deliveryDate.slice(0,7);
    if(!mo[k]) mo[k]={mo:new Date(k+"-01").toLocaleDateString("en-US",{month:"short",year:"2-digit"}),raw:k};
    if(fams.indexOf(r.family)>=0){
      mo[k][r.family+"_s"] = (mo[k][r.family+"_s"]||0) + r.totalInv*r.rate;
      mo[k][r.family+"_q"] = (mo[k][r.family+"_q"]||0) + r.qty;
    }
  });
  var data = Object.values(mo).sort(function(a,b){return a.raw.localeCompare(b.raw);}).map(function(row){
    var out={mo:row.mo};
    fams.forEach(function(f){ out[f] = row[f+"_q"]>0 ? parseFloat((row[f+"_s"]/row[f+"_q"]).toFixed(2)) : null; });
    return out;
  });
  return {data:data, fams:fams};
}
function getPCustData(rows){
  var m={};
  rows.forEach(function(r){
    var k=r.customer;
    if(!m[k]) m[k]={name:k.split(" ").slice(0,2).join(" "),remQty:0,remAmt:0};
    m[k].remQty += r.remQty; m[k].remAmt += r.remAmt;
  });
  return Object.values(m).sort(function(a,b){return b.remAmt-a.remAmt;}).slice(0,9).map(function(d){
    return {name:d.name, remQty:Math.round(d.remQty), remAmt:Math.round(d.remAmt)};
  });
}
function getPFamData(rows){
  var m={};
  rows.forEach(function(r){
    if(!m[r.family]) m[r.family]={family:r.family,remQty:0,remAmt:0};
    m[r.family].remQty += r.remQty; m[r.family].remAmt += r.remAmt;
  });
  return Object.values(m).sort(function(a,b){return b.remAmt-a.remAmt;}).map(function(d){
    return {family:d.family, remQty:Math.round(d.remQty), remAmt:Math.round(d.remAmt)};
  });
}

function SalesTab(props){

  var s2=useState(false);var sumL=s2[0];var setSumL=s2[1];
  var s3=useState([]);var alts=s3[0];var setAlts=s3[1];
  var s4=useState(false);var altL=s4[0];var setAltL=s4[1];
  var s5=useState([]);var rsks=s5[0];var setRsks=s5[1];
  var s6=useState(false);var rskL=s6[0];var setRskL=s6[1];
  var s7=useState(null);var fore=s7[0];var setFore=s7[1];
  var s8=useState(false);var forL=s8[0];var setForL=s8[1];
  var s9=useState("");var dig=s9[0];var setDig=s9[1];
  var s10=useState(false);var digL=s10[0];var setDigL=s10[1];
  var s11=useState(false);var copied=s11[0];var setCopied=s11[1];
  var s12=useState([]);var msgs=s12[0];var setMsgs=s12[1];
  var s13=useState(false);var chatL=s13[0];var setChatL=s13[1];
  var s14=useState("");var cin=s14[0];var setCin=s14[1];
  var chatRef = useRef(null);

  var hasKey = CONFIG.ANTHROPIC_KEY && CONFIG.ANTHROPIC_KEY!=="YOUR_ANTHROPIC_KEY";
  var families = Array.from(new Set(sRows.map(function(r){return r.family;}))).join(", ");
  var topCustomers = Array.from(new Set(sRows.map(function(r){return r.customer;}))).slice(0,6).join(", ");
  var ctx = "Egyptian British Co - Specialty Chemicals. Sales: "+sRows.length+" rows, "+sk.totalOrders+" orders. Qty: "+fK(sk.totalQty)+" KG. Val(ex-VAT): "+fK(sk.totalVal)+" EGP. AvgPrice/KG: "+num(sk.avgPO,2)+" EGP. Best: "+sk.bestProd+" ("+fK(sk.bestQty)+" KG). Pending: "+pRows.length+" orders, Rem: "+fK(pk.remAmt)+" EGP, "+fK(pk.remQty)+" KG. Customers: "+topCustomers+". Families: "+families+".";

  async function callAI(prompt, sys){
    if(!hasKey) return "Add your Anthropic API key to CONFIG.ANTHROPIC_KEY in index.html to enable AI features.";
    try{
      var r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":CONFIG.ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:sys||"You are a senior sales analyst for Egyptian British Co, a specialty chemicals company. Be precise and professional. Use EGP currency.",
          messages:[{role:"user",content:prompt}]})});
      var d = await r.json();
      if(d.error) return "Error: "+d.error.message;
      return (d.content&&d.content[0]&&d.content[0].text)||"No response.";
    }catch(e){return "Error: "+e.message;}
  }

  function parseAlerts(text){
    var lines = text.split("\n").filter(function(l){return l.indexOf("|")>=0;});
    var parsed = lines.map(function(l){var parts=l.split("|");return{type:parts[0].trim().toLowerCase(),msg:parts.slice(1).join("|").trim()};});
    return parsed.length ? parsed : [{type:"info",msg:text}];
  }

  async function genSum(){setSumL(true);var r=await callAI("Write a 4-sentence performance summary with specific numbers. Data: "+ctx);setSum(r);setSumL(false);}
  async function genAlts(){setAltL(true);var r=await callAI("Identify 4 anomalies. Format: TYPE|MESSAGE (TYPE=warn/danger/info/good)\nData: "+ctx,"Return only formatted lines.");setAlts(parseAlerts(r));setAltL(false);}
  async function genRsks(){setRskL(true);var r=await callAI("Identify 4 pending order risks. Format: TYPE|MESSAGE (TYPE=warn/danger/info/good)\nData: "+pRows.length+" orders, "+fK(pk.remAmt)+" EGP remaining.","Return only formatted lines.");setRsks(parseAlerts(r));setRskL(false);}
  async function genFore(){
    setForL(true);
    var r=await callAI("Forecast next month revenue. Return ONLY JSON: {value:string,confidence:string,trend:string,notes:string}\nData: "+ctx,"Return only valid JSON.");
    try{var j=JSON.parse(r.replace(/```json|```/g,"").trim());setFore(j);}
    catch(e){setFore({value:"N/A",confidence:"--",trend:"flat",notes:r.slice(0,150)});}
    setForL(false);
  }
  async function genDig(){setDigL(true);var r=await callAI("Write a weekly digest under 180 words for email/WhatsApp. Include key metrics, highlights, 2 action points.\nData: "+ctx,"Plain text only. No markdown.");setDig(r);setDigL(false);}
  async function sendChat(){
    var msg=cin.trim();if(!msg||chatL)return;
    setCin("");setMsgs(function(p){return p.concat([{role:"user",content:msg}]);});setChatL(true);
    var r=await callAI("Answer in max 3 sentences with numbers.\nQuestion: "+msg+"\nData: "+ctx,"Sales analyst for EBC. Max 3 sentences with numbers.");
    setMsgs(function(p){return p.concat([{role:"ai",content:r}]);});setChatL(false);
  }
  useEffect(function(){if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs,chatL]);

  function Panel(pp){
    return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      h("div",null,h("div",{className:"st",style:{marginBottom:2}},pp.title),h("p",{style:{fontSize:11,color:B.muted}},pp.sub)),
      h("button",{className:"btn bo",onClick:pp.onGen,disabled:pp.loading,style:{fontSize:11,minWidth:90}},
        pp.loading?h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"spin"}),"..."):pp.label||"Generate")
    );
  }

  return h("div",null,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}},
      h("div",null,h("h1",{style:{fontFamily:"'DM Serif Display',serif",fontSize:24}},"AI Insights"),h("p",{style:{fontSize:11.5,color:B.muted,marginTop:3}},"Powered by Claude AI - analyzing your live EBC data")),
      h("button",{className:"btn bb",onClick:function(){genSum();genAlts();genRsks();genFore();}},"Refresh All")
    ),
    h("div",{className:"card",style:{marginBottom:14}},
      h(Panel,{title:"Performance Summary",sub:"Auto-generated from current data",onGen:genSum,loading:sumL}),
      h("div",{style:{minHeight:72,background:B.blueLL,borderRadius:10,border:"1px solid "+B.border,padding:"14px 16px",fontSize:13,lineHeight:1.8,color:B.text}},
        sumL?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted}},h("span",{className:"spin"}),"Generating..."):
        sum||h("span",{style:{color:B.subtle}},"Click Generate to create a performance summary.")
      )
    ),
    h("div",{className:"g2",style:{marginBottom:14}},
      h("div",{className:"card"},
        h(Panel,{title:"Anomaly Detection",sub:"Unusual patterns",onGen:genAlts,loading:altL,label:"Detect"}),
        altL?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted,padding:"16px 0"}},h("span",{className:"spin"}),"Scanning..."):
        alts.length?h("div",null,alts.map(function(a,i){return h("div",{key:i,className:"aia ai"+a.type.charAt(0)},a.msg);})):
        h("div",{style:{color:B.subtle,fontSize:12.5,padding:"10px 0"}},"Click Detect to scan for anomalies.")
      ),
      h("div",{className:"card"},
        h(Panel,{title:"Pending Orders Risk",sub:"High-priority items",onGen:genRsks,loading:rskL,label:"Analyze"}),
        rskL?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted,padding:"16px 0"}},h("span",{className:"spin"}),"Analyzing..."):
        rsks.length?h("div",null,rsks.map(function(r,i){return h("div",{key:i,className:"aia ai"+r.type.charAt(0)},r.msg);})):
        h("div",{style:{color:B.subtle,fontSize:12.5,padding:"10px 0"}},"Click Analyze to flag urgent pending items.")
      )
    ),
    h("div",{className:"g2",style:{marginBottom:14}},
      h("div",{className:"card"},
        h(Panel,{title:"Next Month Forecast",sub:"AI revenue projection",onGen:genFore,loading:forL,label:"Forecast"}),
        forL?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted,padding:"16px 0"}},h("span",{className:"spin"}),"Building forecast..."):
        fore?h("div",null,
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}},
            h("div",{style:{background:B.blueL,borderRadius:10,padding:"12px",textAlign:"center"}},h("div",{style:{fontSize:10,fontWeight:700,color:B.blue,letterSpacing:".07em",marginBottom:4}},"FORECAST"),h("div",{style:{fontSize:22,fontWeight:800,color:B.blue,fontFamily:"'DM Serif Display',serif"}},fore.value)),
            h("div",{style:{background:B.greenL,borderRadius:10,padding:"12px",textAlign:"center"}},h("div",{style:{fontSize:10,fontWeight:700,color:B.green,letterSpacing:".07em",marginBottom:4}},"CONFIDENCE"),h("div",{style:{fontSize:22,fontWeight:800,color:B.green,fontFamily:"'DM Serif Display',serif"}},fore.confidence)),
            h("div",{style:{background:B.blueLL,borderRadius:10,padding:"12px",textAlign:"center"}},h("div",{style:{fontSize:10,fontWeight:700,color:B.muted,letterSpacing:".07em",marginBottom:4}},"TREND"),h("div",{style:{fontSize:22,fontWeight:800}},fore.trend==="up"?"up":fore.trend==="down"?"down":"flat"))
          ),
          h("p",{style:{fontSize:12.5,color:B.muted,lineHeight:1.7}},fore.notes)
        ):h("div",{style:{color:B.subtle,fontSize:12.5,padding:"10px 0"}},"Click Forecast to project next month revenue.")
      ),
      h("div",{className:"card"},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          h("div",null,h("div",{className:"st",style:{marginBottom:2}},"Weekly Digest"),h("p",{style:{fontSize:11,color:B.muted}},"Copy and paste into email or WhatsApp")),
          h("div",{style:{display:"flex",gap:6}},
            dig&&h("button",{className:"btn bg",onClick:function(){navigator.clipboard.writeText(dig);setCopied(true);setTimeout(function(){setCopied(false);},2000);},style:{fontSize:11}},copied?"Copied!":"Copy"),
            h("button",{className:"btn bo",onClick:genDig,disabled:digL,style:{fontSize:11}},digL?h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"spin"}),"..."):"Generate")
          )
        ),
        h("div",{style:{minHeight:130,background:"#FAFBFD",borderRadius:10,border:"1px solid "+B.border,padding:"13px 15px",fontSize:12.5,lineHeight:1.8,color:B.text,whiteSpace:"pre-wrap",overflowY:"auto",maxHeight:200}},
          digL?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:B.muted}},h("span",{className:"spin"}),"Drafting..."):
          dig||h("span",{style:{color:B.subtle}},"Click Generate to draft a weekly summary.")
        )
      )
    ),
    h("div",{className:"card"},
      h("div",{className:"st",style:{marginBottom:4}},"Ask Your Data"),
      h("p",{style:{fontSize:11.5,color:B.muted,marginBottom:14}},"Ask anything in plain language about your sales data"),
      h("div",{ref:chatRef,style:{maxHeight:280,overflowY:"auto",marginBottom:12,padding:"4px 0"}},
        msgs.length===0&&!chatL&&h("div",{style:{textAlign:"center",padding:"28px 0",color:B.subtle,fontSize:13}},"Ask a question below"),
        msgs.map(function(m,i){return h("div",{key:i,className:"cbbl",style:m.role==="user"?{marginLeft:"auto",background:B.blue,color:"#fff"}:{background:"#F1F5F9",color:B.text}},m.content);}),
        chatL&&h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"10px 0",color:B.muted,fontSize:13}},h("span",{className:"spin"}),"Analyzing...")
      ),
      h("div",{style:{display:"flex",gap:8,marginBottom:10}},
        h("input",{value:cin,onChange:function(e){setCin(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")sendChat();},
          placeholder:"e.g. Who is the top salesperson?",
          style:{flex:1,padding:"10px 14px",border:"1.5px solid "+B.border,borderRadius:10,fontSize:13,color:B.text,outline:"none"}}),
        h("button",{className:"btn bb",onClick:sendChat,disabled:chatL||!cin.trim(),style:{whiteSpace:"nowrap",padding:"10px 18px"}},"Send")
      ),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
        ["Top salesperson?","Highest price family?","Largest pending customer?","Best selling product?"].map(function(q){
          return h("button",{key:q,onClick:function(){setCin(q);},style:{padding:"5px 12px",borderRadius:7,border:"1px solid "+B.border,background:B.blueLL,color:B.blue,fontSize:11,cursor:"pointer",fontWeight:600}},q);
        })
      )
    )
  );
}

function PrintArea(){
  return h("div",{id:"pa",style:{display:"none",padding:24,fontFamily:"'Plus Jakarta Sans',sans-serif"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:20,borderBottom:"2px solid #E0E7EF",paddingBottom:16}},
      h("div",{style:{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#1976D2,#D32F2F)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800}},"E"),
      h("div",null,
        h("div",{style:{fontSize:17,fontWeight:800}},h("span",{style:{color:"#1976D2"}},"Egyptian "),h("span",{style:{color:"#D32F2F"}},"British Co.")),
        h("div",{style:{fontSize:11,color:"#8898AA"}},"Specialty Chemicals and Auxiliaries - Pending Orders Report - "+new Date().toLocaleDateString("en-GB"))
      )
    ),
    h("h2",{style:{fontSize:16,fontWeight:700,marginBottom:16}},"Pending Sales Orders"),
    h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
      h("thead",null,h("tr",{style:{background:"#E3F2FD"}},
        ["Order Date","Customer","Country","Product","Family","Req Qty KG","Del Qty KG","Rem Qty KG","Price ex-VAT","Rem Amt EGP","Status","Payment Terms"].map(function(c){
          return h("th",{key:c,style:{padding:"7px 8px",textAlign:"left",color:"#1976D2",fontWeight:700,border:"1px solid #E0E7EF",fontSize:10}},c);
        })
      )),
      h("tbody",{id:"ptb"})
    ),
    h("div",{style:{marginTop:18,fontSize:10,color:"#8898AA",borderTop:"1px solid #E0E7EF",paddingTop:10}},"Generated: "+new Date().toLocaleString("en-GB")+" - Egyptian British Co. Confidential")
  );
}

function App(){
  var s1=useState(null);var user=s1[0];var setUser=s1[1];
  var s2=useState("sales");var tab=s2[0];var setTab=s2[1];
  var s3=useState(true);var loading=s3[0];var setLoading=s3[1];
  var s4=useState("Connecting...");var loadMsg=s4[0];var setLoadMsg=s4[1];
  var s5=useState(null);var error=s5[0];var setError=s5[1];
  var s6=useState([]);var salesData=s6[0];var setSalesData=s6[1];
  var s7=useState([]);var pendingData=s7[0];var setPendingData=s7[1];
  var s8=useState([]);var rlsUsers=s8[0];var setRlsUsers=s8[1];
  var s9=useState(null);var lastSync=s9[0];var setLastSync=s9[1];

  useEffect(function(){
    var configured = CONFIG.GOOGLE_API_KEY && CONFIG.GOOGLE_API_KEY!=="YOUR_GOOGLE_API_KEY";
    if(!configured){ setError("SETUP"); setLoading(false); return; }
    async function load(){
      try{
        setLoadMsg("Loading Sales View...");
        var sr = await fetchSheet(CONFIG.SALES_SHEET_ID, "Sales View");
        setSalesData(sr.map(normS));
        setLoadMsg("Loading Pending Sales...");
        var pr = await fetchSheet(CONFIG.PENDING_SHEET_ID, "Pending Sales");
        setPendingData(pr.map(normP));
        setLoadMsg("Loading access config...");
        var rr = await fetchSheet(CONFIG.RLS_SHEET_ID, "RLS Config");
        setRlsUsers(rr.map(normR));
        setLastSync(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
        setLoading(false);
      }catch(e){ setError(e.message); setLoading(false); }
    }
    load();
  },[]);

  if(loading) return h("div",{className:"ls"},
    h(Logo,{size:"lg"}),
    h("div",{className:"bs",style:{marginTop:16}}),
    h("p",{style:{color:B.muted,fontSize:14,fontWeight:500}},loadMsg)
  );

  if(error==="SETUP") return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:B.bg,padding:20}},
    h("div",{style:{background:"#fff",border:"2px solid #FDE68A",borderRadius:18,padding:"40px 36px",maxWidth:520,textAlign:"center",boxShadow:"0 12px 48px rgba(0,0,0,.08)"}},
      h(Logo,{size:"lg"}),
      h("div",{style:{fontSize:36,margin:"20px 0"}},"Setup Required"),
      h("p",{style:{fontSize:13.5,color:B.muted,lineHeight:1.8,marginBottom:20}},"Open index.html in Notepad. At the top of the file, fill in your 5 keys in the CONFIG block, then re-upload to GitHub."),
      h("div",{style:{background:"#0F1C2E",color:"#E2E8F0",borderRadius:10,padding:"16px 20px",textAlign:"left",fontSize:12,fontFamily:"monospace",lineHeight:2}},
        "GOOGLE_API_KEY: ", h("span",{style:{color:"#A5D6A7"}},"your key here"),h("br"),
        "SALES_SHEET_ID: ", h("span",{style:{color:"#A5D6A7"}},"your sheet id"),h("br"),
        "PENDING_SHEET_ID: ",h("span",{style:{color:"#A5D6A7"}},"your sheet id"),h("br"),
        "RLS_SHEET_ID: ",    h("span",{style:{color:"#A5D6A7"}},"your sheet id"),h("br"),
        "ANTHROPIC_KEY: ",   h("span",{style:{color:"#A5D6A7"}},"your key (optional)")
      )
    )
  );

  if(error) return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:B.bg,padding:20}},
    h("div",{style:{background:"#fff",border:"2px solid #FECACA",borderRadius:18,padding:"40px 36px",maxWidth:540,textAlign:"center"}},
      h("div",{style:{fontSize:36,marginBottom:12}},"Connection Error"),
      h("p",{style:{color:B.red,fontSize:14,marginBottom:16,fontWeight:600}},error),
      h("div",{style:{background:B.blueLL,borderRadius:10,padding:"14px 16px",fontSize:12.5,color:B.muted,textAlign:"left",lineHeight:1.9}},
        "Check these:",h("br"),
        "1. All 3 Sheet IDs are correct",h("br"),
        "2. All 3 sheets shared as Anyone with link can view",h("br"),
        "3. Google API key is valid and Sheets API is enabled",h("br"),
        "4. Sheet tab names match exactly: Sales View / Pending Sales / RLS Config"
      )
    )
  );

  if(!user) return h("div",null, h(LoginPage,{rlsUsers:rlsUsers,onLogin:function(u){setUser(u);setTab("sales");}}), h(PrintArea));

  var TABS = [["sales","Sales Dashboard"],["pending","Pending Orders"],["ai","AI Insights"]];

  return h("div",{id:"app"},
    h(Header,{user:user,onLogout:function(){setUser(null);},lastSync:lastSync}),
    h("div",{style:{background:"#fff",borderBottom:"1px solid "+B.border}},
      h("div",{style:{maxWidth:1480,margin:"0 auto",padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}},
        TABS.map(function(t){return h("button",{key:t[0],className:"tab"+(tab===t[0]?" on":""),onClick:function(){setTab(t[0]);}},t[1]);})
      )
    ),
    h("div",{className:"page"},
      tab==="sales"&&h(SalesTab,{user:user,salesData:salesData}),
      tab==="pending"&&h(PendingTab,{user:user,pendingData:pendingData}),
      tab==="ai"&&h(AITab,{user:user,salesData:salesData,pendingData:pendingData})
    ),
    h("div",{style:{textAlign:"center",padding:"12px 0 20px",color:B.subtle,fontSize:11,borderTop:"1px solid "+B.border,marginTop:8}},
      h("span",{style:{fontWeight:700}},h("span",{style:{color:B.blue}},"Egyptian "),h("span",{style:{color:B.red}},"British Co.")),
      " - Sales Intelligence Portal - ",user.role==="rep"?"RLS Active: "+user.rep_name+" view only":"Full manager access"
    ),
    h(PrintArea)
  );
}

ReactDOM.render(h(App), document.getElementById("root"));

} // end startApp
</script>
</body>
